        <style>
            /* From Uiverse.io by catraco - Modified for compatibility */
            .copy-btn-container {
                --color: #cbd5e1;
                /* Slate-300 - softer color */
                --size: 18px;
                /* Slightly smaller */
                display: flex;
                justify-content: center;
                align-items: center;
                position: relative;
                cursor: pointer;
                font-size: var(--size);
                user-select: none;
                fill: var(--color);
                width: 28px;
                /* Slightly smaller */
                height: 28px;
                /* Slightly smaller */
                opacity: 0.6;
                /* More subtle default state */
                transition: opacity 0.2s ease;
            }

            .dark .copy-btn-container {
                --color: #64748b;
                /* Slate-500 - softer in dark mode */
                opacity: 0.5;
                /* Even more subtle in dark mode */
            }

            .copy-btn-container:hover {
                --color: #94a3b8;
                /* Slightly brighter on hover */
                opacity: 0.9;
                /* More visible on hover */
            }

            .dark .copy-btn-container:hover {
                --color: #94a3b8;
                /* Brighter in dark mode hover */
                opacity: 0.8;
            }

            .copy-btn-container .clipboard {
                position: absolute;
                animation: keyframes-fill .3s ease-out;
                /* Faster, smoother animation */
                transition: fill 0.15s ease;
            }

            .copy-btn-container .clipboard-check {
                position: absolute;
                display: none;
                animation: keyframes-fill .3s ease-out;
                /* Faster, smoother */
                fill: #10b981;
                /* Keep emerald color for success feedback */
                opacity: 0.8;
                /* Slightly softer */
            }

            /* ------ On check event ------ */
            .copy-btn-container input:checked~.clipboard {
                display: none;
            }

            .copy-btn-container input:checked~.clipboard-check {
                display: block;
            }

            /* ------ Hide the default checkbox ------ */
            .copy-btn-container input {
                position: absolute;
                opacity: 0;
                cursor: pointer;
                height: 0;
                width: 0;
            }

            /* ------ Animation ------ */
            @keyframes keyframes-fill {
                0% {
                    transform: scale(0.8);
                    /* Less dramatic start */
                    opacity: 0;
                }

                50% {
                    transform: scale(1.05);
                    /* Gentler bounce */
                }

                100% {
                    transform: scale(1);
                    opacity: 1;
                }
            }

            /* Loader from Uiverse.io by Fernando-sv */
            .loader {
                border: 4px solid rgba(0, 0, 0, .1);
                border-left-color: transparent;
                width: 36px;
                height: 36px;
                border-radius: 50%;
                animation: spin89345 1s linear infinite;
            }

            .dark .loader {
                border-color: rgba(255, 255, 255, 0.6);
                border-left-color: transparent;
            }

            @keyframes spin89345 {
                0% {
                    transform: rotate(0deg);
                }

                100% {
                    transform: rotate(360deg);
                }
            }

            /* 自定义滚动条样式 */
            .custom-scrollbar::-webkit-scrollbar {
                width: 4px;
            }

            .custom-scrollbar::-webkit-scrollbar-track {
                background: transparent;
            }

            .custom-scrollbar::-webkit-scrollbar-thumb {
                background-color: #cbd5e1;
                border-radius: 4px;
            }

            .dark .custom-scrollbar::-webkit-scrollbar-thumb {
                background-color: #475569;
            }

            /* ===== 黄金比例阅读间距系统 =====
               基于科学的黄金比例 (φ = 1.618) 设计
               - 段落间距 (p → p): 1.618em (大间距，区分不同段落)
               - 标题到正文 (h → p): 0.618em (小间距，保持标题与内容的紧密关联)
               - 新段落到标题 (p → h): 2.618em (最大间距，明确区分不同章节)
            */

            /* Post Title Responsive Styles */
            .post-title {
                line-height: 1.2 !important;
                margin-top: 1.25rem !important;
                margin-bottom: 2rem !important;
                font-size: 2.25rem !important;
            }

            @media (min-width: 768px) {
                .post-title {
                    margin-bottom: 3.5rem !important;
                    font-size: 3.51rem !important;
                }
            }

            .dark .post-title {
                color: #e2e8f0 !important;
                /* Slate-200 */
            }

            /* 段落样式：段落之间使用黄金比例间距 */
            .prose {
                font-size: 1.15rem !important;
            }

            @media (min-width: 768px) {
                .prose {
                    font-size: 1.25rem !important;
                }
            }

            .prose p {
                color: #334155 !important;
                /* Slate-700 */
                margin-bottom: 1.75rem !important;
                /* 从 2rem 减少到 1.75rem (28px) */
                line-height: 1.8 !important;
                /* 默认左对齐，通过类名控制具体对齐方式 */
                text-align: left;
                /* 防止孤行标点：允许标点溢出容器边缘 */
                hanging-punctuation: allow-end last;
                /* 严格换行规则：防止标点出现在行首 */
                line-break: strict;
                /* 允许长单词/URL换行但优先保持完整 */
                overflow-wrap: break-word;
                /* 强制不使用连字符换行 */
                -webkit-hyphens: none !important;
                -ms-hyphens: none !important;
                hyphens: none !important;
            }

            /* 纯中文段落：两端对齐 */
            .prose p.text-justify-cjk {
                text-align: justify !important;
                text-align-last: left !important;
                /* 优化中文排版 */
                text-justify: inter-ideograph;
                /* 防止孤行标点：允许标点溢出容器边缘 */
                hanging-punctuation: allow-end last;
                /* 严格换行规则 */
                line-break: strict;
            }

            /* 英文/混排段落：左对齐 */
            .prose p.text-align-left {
                text-align: left !important;
                /* 继承防止孤行标点的规则 */
            }

            .dark .prose p {
                color: #94a3b8 !important;
                /* Slate-400 */
            }

            /* 移除段落末尾多余间距 */
            .prose p:last-child {
                margin-bottom: 0 !important;
            }



            /* 列表样式优化：增加列表项间距使其与 2.2 行高协调 */
            .prose ul,
            .prose ol {
                margin-bottom: 2rem !important;
            }

            .prose li {
                margin-bottom: 1.25rem !important;
                /* 列表项内部间距 */
                line-height: 1.8 !important;
            }

            .prose li:last-child {
                margin-bottom: 0 !important;
            }

            /* 软换行 (Shift+Enter / <br>) 使用正常行间距 */
            .prose br {
                display: block !important;
                content: "" !important;
                margin: 0 !important;
                /* 行间距由 line-height 控制，不添加额外间距 */
            }

            .prose .katex {
                font-size: 1em;
            }

            .prose .katex-display {
                color: #334155 !important;
                overflow-x: auto;
                overflow-y: hidden;
                padding: 0.2rem 0;
                margin: 2rem 0 !important;
                /* 统一使用 2rem */
            }

            .dark .prose .katex-display {
                color: #94a3b8 !important;
            }

            .prose .katex-display::-webkit-scrollbar {
                height: 6px;
            }

            .prose .katex-display::-webkit-scrollbar-thumb {
                background-color: rgba(100, 116, 139, .35);
                border-radius: 4px;
            }

            .dark .prose .katex-display::-webkit-scrollbar-thumb {
                background-color: rgba(148, 163, 184, .25);
            }

            .prose .katex-display>.katex {
                white-space: nowrap;
            }

            /* H1 标题 - Highest Level */
            .prose h1 {
                font-size: 2.0rem !important;
                /* Mobile */
                line-height: 1.2 !important;
                margin-bottom: 0.618em !important;
                margin-top: 1.618em !important;
                font-weight: 900 !important;
            }

            /* H2 标题 */
            .prose h2 {
                font-size: 1.75rem !important;
                /* Mobile */
                line-height: 1.3 !important;
                margin-bottom: 0.618em !important;
                margin-top: 1.618em !important;
                font-weight: 800 !important;
            }

            /* H3 标题 */
            .prose h3 {
                font-size: 1.5rem !important;
                /* Mobile */
                line-height: 1.4 !important;
                margin-bottom: 0.618em !important;
                margin-top: 1.618em !important;
                font-weight: 700 !important;
            }

            /* H4 标题 */
            .prose h4 {
                font-size: 1.25rem !important;
                /* Mobile */
                line-height: 1.5 !important;
                margin-bottom: 0.618em !important;
                margin-top: 1.618em !important;
                font-weight: 600 !important;
            }

            /* H5 标题 */
            .prose h5 {
                font-size: 1.15rem !important;
                /* Mobile */
                line-height: 1.5 !important;
                margin-bottom: 0.618em !important;
                margin-top: 1.618em !important;
                font-weight: 600 !important;
            }

            /* H6 标题 */
            .prose h6 {
                font-size: 1.05rem !important;
                /* Mobile */
                line-height: 1.5 !important;
                margin-bottom: 0.618em !important;
                margin-top: 1.618em !important;
                font-weight: 700 !important;
                letter-spacing: 0.05em;
            }

            /* Dark Mode Headings Color Update */
            .dark .prose h1,
            .dark .prose h2,
            .dark .prose h3,
            .dark .prose h4,
            .dark .prose h5,
            .dark .prose h6 {
                color: #94a3b8 !important;
                /* Slate-400 */
            }

            /* Desktop Golden Ratio Overrides */
            @media (min-width: 768px) {
                .prose h1 {
                    font-size: 3.51rem !important;
                }

                .prose h2 {
                    font-size: 2.808rem !important;
                }

                .prose h3 {
                    font-size: 2.246rem !important;
                }

                .prose h4 {
                    font-size: 1.797rem !important;
                }

                .prose h5 {
                    font-size: 1.438rem !important;
                }

                .prose h6 {
                    font-size: 1.15rem !important;
                }
            }

            /* 确保第一个标题没有顶部间距 */
            .prose>h1:first-child,
            .prose>h2:first-child,
            .prose>h3:first-child,
            .prose>h4:first-child,
            .prose>h5:first-child,
            .prose>h6:first-child {
                margin-top: 0 !important;
            }

            /* ===== 核心逻辑：只有段落或标题后的标题才使用大间距 ===== */
            /* 段落后面的标题使用大间距，明确区分章节 */
            .prose p+h1,
            .prose p+h2,
            .prose p+h3,
            .prose p+h4,
            .prose p+h5,
            .prose p+h6 {
                margin-top: 2.618em !important;
            }

            /* 标题后面的标题使用大间距（区分不同章节） */
            .prose h1+h1,
            .prose h2+h2,
            .prose h3+h3,
            .prose h4+h4,
            .prose h5+h5,
            .prose h6+h6 {
                margin-top: 2.618em !important;
            }

            /* 连续标题之间的间距（如 h2 紧跟 h3）使用中等间距 */
            .prose h1+h2,
            .prose h2+h3,
            .prose h3+h4,
            .prose h4+h5,
            .prose h5+h6 {
                margin-top: 1.25rem !important;
                /* 稍微增加一点，与行高协调 */
            }

            /* 列表、引用块、代码块后的标题使用大间距 */
            .prose ul+h1,
            .prose ul+h2,
            .prose ul+h3,
            .prose ul+h4,
            .prose ul+h5,
            .prose ul+h6,
            .prose ol+h1,
            .prose ol+h2,
            .prose ol+h3,
            .prose ol+h4,
            .prose ol+h5,
            .prose ol+h6,
            .prose blockquote+h1,
            .prose blockquote+h2,
            .prose blockquote+h3,

    <!-- 代码块复制功能 - 内联脚本确保可靠性 -->
    <script>
        (function () {
            // 使用 fallback 方法复制到剪贴板
            function copyToClipboard(text) {
                // 尝试使用现代 API
                if (navigator.clipboard && window.isSecureContext) {
                    return navigator.clipboard.writeText(text);
                }
                // Fallback: 使用 textarea + execCommand
                const textarea = document.createElement('textarea');
                textarea.value = text;
                textarea.style.position = 'fixed';
                textarea.style.left = '-9999px';
                textarea.style.top = '-9999px';
                document.body.appendChild(textarea);
                textarea.focus();
                textarea.select();
                return new Promise((resolve, reject) => {
                    try {
                        document.execCommand('copy') ? resolve() : reject();
                    } catch (err) {
                        reject(err);
                    } finally {
                        textarea.remove();
                    }
                });
            }

            // 绑定点击事件
            document.addEventListener('click', function (e) {
                var btn = e.target.closest('.copy-btn');
                if (btn) {
                    var container = btn.closest('.code-block-container');
                    if (!container) return;

                    var codeEl = container.querySelector('.code-content code') ||
                        container.querySelector('pre code') ||
                        container.querySelector('code');
                    if (!codeEl) return;

                    var textToCopy = codeEl.textContent || codeEl.innerText || '';

                    copyToClipboard(textToCopy).then(function () {
                        btn.style.transition = 'transform 0.1s ease-out';
                        btn.style.transform = 'scale(0.92)';
                        setTimeout(function () {
                            btn.style.transition = 'transform 0.15s cubic-bezier(0.34, 1.56, 0.64, 1)';
                            btn.style.transform = 'scale(1)';
                        }, 50);
                    }).catch(function (err) {
                        console.error('Copy failed:', err);
                    });
                    return;
                }

                var foldBtn = e.target.closest('.fold-toggle-btn');
                if (foldBtn) {
                    var container = foldBtn.closest('.code-block-container');
                    var wrapper = container.querySelector('.code-content');
                    var controls = container.querySelector('.code-fold-controls');
                    var isFolded = container.classList.contains('collapsed-code');
                    var expandIcon = foldBtn.querySelector('.fold-icon-expand');
                    var collapseIcon = foldBtn.querySelector('.fold-icon-collapse');

                    if (isFolded) {
                        // Expand
                        container.classList.remove('collapsed-code');
                        wrapper.style.maxHeight = wrapper.scrollHeight + 'px';
                        controls.classList.remove('absolute', 'bottom-0', 'h-20', 'bg-gradient-to-t');
                        controls.classList.add('flex', 'justify-center', 'py-2', 'border-t', 'border-slate-200/50', 'dark:border-slate-700/50', 'bg-slate-50/50', 'dark:bg-transparent');

                        if (expandIcon) expandIcon.classList.add('hidden');
                        if (collapseIcon) collapseIcon.classList.remove('hidden');

                        setTimeout(function () {
                            wrapper.style.maxHeight = 'none';
                        }, 300);
                    } else {
                        // Collapse
                        wrapper.style.maxHeight = wrapper.scrollHeight + 'px';
                        // Force reflow
                        wrapper.offsetHeight;
                        container.classList.add('collapsed-code');
                        wrapper.style.maxHeight = '400px';
                        controls.classList.add('absolute', 'bottom-0', 'h-20', 'bg-gradient-to-t');
                        controls.classList.remove('py-4', 'border-t', 'border-slate-200/50', 'dark:border-slate-700/50', 'bg-slate-50/50', 'dark:bg-transparent');

                        if (expandIcon) expandIcon.classList.remove('hidden');
                        if (collapseIcon) collapseIcon.classList.add('hidden');

                        // Scroll back to container top if the button is far away
                        const rect = container.getBoundingClientRect();
                        if (rect.top < 0) {
                            window.scrollTo({
                                top: window.scrollY + rect.top - 100,
                                behavior: 'smooth'
                            });
                        }
                    }
                }
            });

            // 初始化代码块折叠检测
            function initCodeFolding() {
                var blocks = document.querySelectorAll('.code-block-container.code-fold');
                blocks.forEach(function (block) {
                    var content = block.querySelector('.code-content');
                    var controls = block.querySelector('.code-fold-controls');

                    if (content.scrollHeight > 500) { // 如果内容高度大于 500px 则折叠
                        block.classList.add('collapsed-code');
                        content.style.maxHeight = '400px';
                        controls.classList.remove('hidden');
                    } else {
                        block.classList.remove('code-fold'); // 不需要折叠功能
                    }
                });
            }

            // 在页面加载后和 DOM 可能改变后运行
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initCodeFolding);
            } else {
                initCodeFolding();
            }

            // CSS 动态注入 (为了减少 HTML 侵入)
            const foldStyles = `
                .collapsed-code .code-content {
                    overflow-y: hidden !important;
                }
                .collapsed-code .code-fold-controls {
                    display: flex !important;
                }
            `;
            const styleSheet = document.createElement("style");
            styleSheet.innerText = foldStyles;
            document.head.appendChild(styleSheet);

            // Back to Top & Scroll to Bottom & Floating Go Back 逻辑
            var backToTopBtn = document.getElementById('back-to-top');
            var scrollToBottomBtn = document.getElementById('scroll-to-bottom');
            var floatingGoBackBtn = document.getElementById('floating-go-back');

            function toggleNavButtons() {
                var scrollY = window.scrollY;
                if (scrollY > 500) {
                    if (backToTopBtn) {
                        backToTopBtn.classList.remove('opacity-0', 'invisible', 'translate-x-4');
                        backToTopBtn.classList.add('opacity-100', 'visible', 'translate-x-0');
                    }
                    if (scrollToBottomBtn) {
                        scrollToBottomBtn.classList.remove('opacity-0', 'invisible', 'translate-x-4');
                        scrollToBottomBtn.classList.add('opacity-100', 'visible', 'translate-x-0');
                    }
                    if (floatingGoBackBtn) {
                        floatingGoBackBtn.classList.remove('opacity-0', 'invisible', '-translate-x-4');
                        floatingGoBackBtn.classList.add('opacity-100', 'visible', 'translate-x-0');
                    }
                } else {
                    if (backToTopBtn) {
                        backToTopBtn.classList.add('opacity-0', 'invisible', 'translate-x-4');
                        backToTopBtn.classList.remove('opacity-100', 'visible', 'translate-x-0');
                    }
                    if (scrollToBottomBtn) {
                        scrollToBottomBtn.classList.add('opacity-0', 'invisible', 'translate-x-4');
                        scrollToBottomBtn.classList.remove('opacity-100', 'visible', 'translate-x-0');
                    }
                    if (floatingGoBackBtn) {
                        floatingGoBackBtn.classList.add('opacity-0', 'invisible', '-translate-x-4');
                        floatingGoBackBtn.classList.remove('opacity-100', 'visible', 'translate-x-0');
                    }
                }
            }

            if (backToTopBtn || scrollToBottomBtn || floatingGoBackBtn) {
                window.addEventListener('scroll', toggleNavButtons);

                if (backToTopBtn) {
                    backToTopBtn.addEventListener('click', function () {
                        window.scrollTo({ top: 0, behavior: 'smooth' });
                        var tocContainer = document.getElementById('toc-container');
                        if (tocContainer) {
                            tocContainer.scrollTo({ top: 0, behavior: 'smooth' });
                        }
                    });
                }

                if (scrollToBottomBtn) {
                    scrollToBottomBtn.addEventListener('click', function () {
                        const article = document.querySelector('article');
                        if (article) {
                            const articleBottom = article.offsetTop + article.offsetHeight;
                            // Calculate "Footer Safe" maximum scroll position (buffer 60px)
                            const articleEndScrollY = articleBottom - window.innerHeight + 60;
                            window.scrollTo({
                                top: Math.max(0, articleEndScrollY),
                                behavior: 'smooth'
                            });
                        } else {
                            // Fallback for non-article pages
                            window.scrollTo({
                                top: document.documentElement.scrollHeight,
                                behavior: 'smooth'
                            });
                        }
                    });
                }

                if (floatingGoBackBtn) {
                    floatingGoBackBtn.addEventListener('click', function () {
                        if (document.referrer && document.referrer.includes(window.location.host)) {
                            history.back();
                        } else {
                            window.location.href = '/';
                        }
                    });
                }
            }

            // Share Button Functionality
            var shareBtn = document.getElementById('share-btn');
            if (shareBtn) {
                shareBtn.addEventListener('click', function () {
                    var articleUrl = window.location.href;
                    var articleTitle = document.querySelector('.post-title')?.textContent || document.title;

                    // Check if Web Share API is available (typically on mobile)
                    if (navigator.share) {
                        navigator.share({
                            title: articleTitle,
                            url: articleUrl
                        }).then(function () {
                            console.log('Share successful');
                        }).catch(function (error) {
                            console.log('Share failed:', error);
                            // Fallback to copy on mobile if share fails
                            copyUrlToClipboard(articleUrl);
                        });
                    } else {
                        // Desktop: Copy to clipboard
                        copyUrlToClipboard(articleUrl);
                    }
                });

                function copyUrlToClipboard(url) {
                    copyToClipboard(url).then(function () {
                        // Visual feedback: change button text temporarily
                        var btnText = shareBtn.querySelector('span');
                        var originalText = btnText.textContent;
                        btnText.textContent = '已复制链接！';

                        // Add success animation
                        shareBtn.style.transition = 'transform 0.15s ease-out';
                        shareBtn.style.transform = 'scale(0.95)';

                        setTimeout(function () {
                            shareBtn.style.transition = 'transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1)';
                            shareBtn.style.transform = 'scale(1)';
                        }, 100);

                        setTimeout(function () {
                            btnText.textContent = originalText;
                        }, 2000);
                    }).catch(function (err) {
                        console.error('Copy failed:', err);
                        // Show error feedback
                        var btnText = shareBtn.querySelector('span');
                        var originalText = btnText.textContent;
                        btnText.textContent = '复制失败';
                        setTimeout(function () {
                            btnText.textContent = originalText;
                        }, 2000);
                    });
                }
            }
            // TOC History Optimization & Last Item Sync: Prevent anchor clicks from adding to history
            // and sync last item with scroll-to-bottom behavior.
            var tocLinks = document.querySelectorAll('nav a[href^="#"]');
            tocLinks.forEach((anchor, index) => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href').substring(1);
                    const targetElement = document.getElementById(targetId);
                    const article = document.querySelector('article');

                    if (targetElement && article) {
                        const headerOffset = 100; // Top offset for sticky header
                        const articleBottom = article.offsetTop + article.offsetHeight;

                        // 1. Calculate intended scroll position for the heading
                        const headingScrollY = targetElement.offsetTop - headerOffset;

                        // 2. Calculate "Footer Safe" maximum scroll position
                        const articleEndScrollY = articleBottom - window.innerHeight + 60;

                        // 3. Choice: Use whichever is higher (smaller Y value) to hide footer
                        const finalScrollY = Math.min(headingScrollY, articleEndScrollY);

                        window.scrollTo({
                            top: Math.max(0, finalScrollY),
                            behavior: 'smooth'
                        });

                        // Use replaceState to update URL without pushing to history
                        history.replaceState(null, null, '#' + targetId);
                    }
                });
            });
        })();
    </script>

                // Get elements
                const audio = container.querySelector('audio');
                const playBtn = container.querySelector('.audio-play-btn');
                const playIcon = container.querySelector('.audio-play-icon');
                const progressContainer = container.querySelector('.audio-progress-container');
                const progressBar = container.querySelector('.audio-progress-bar');
                const progressThumb = container.querySelector('.audio-progress-thumb');
                const progressTooltip = container.querySelector('.audio-progress-tooltip');
                const currentTimeEl = container.querySelector('.audio-current-time');
                const durationEl = container.querySelector('.audio-duration');
                const volumeBtn = container.querySelector('.audio-volume-btn');
                const volumeWrapper = container.querySelector('.audio-volume-slider-wrapper');
                const volumeSlider = container.querySelector('.audio-volume-slider');
                const speedBtn = container.querySelector('.audio-speed-btn');
                const speedDropdown = container.querySelector('.audio-speed-dropdown');
                const speedOptions = container.querySelectorAll('.audio-speed-option');

                // Set initial volume
                audio.volume = 0.6;
                let lastVolume = 0.6;

                // Show loading state during seeking
                audio.addEventListener('seeking', () => {
                    // Visual feedback: slightly dim the button during seeking
                    playBtn.style.opacity = '0.6';
                });

                audio.addEventListener('seeked', () => {
                    // Restore button opacity when seek completes
                    playBtn.style.opacity = '1';
                });

                // Play/Pause functionality
                playBtn.addEventListener('click', () => {
                    if (audio.paused) {
                        audio.play();
                    } else {
                        audio.pause();
                    }
                });

                // Listen for playing state to update UI and pause others
                audio.addEventListener('play', () => {
                    playIcon.innerHTML = PAUSE_ICON;
                    // Pause all other audio elements on the page
                    document.querySelectorAll('audio').forEach(otherAudio => {
                        if (otherAudio !== audio && !otherAudio.paused) {
                            otherAudio.pause();
                        }
                    });
                });

                // Listen for pause state to update UI
                audio.addEventListener('pause', () => {
                    playIcon.innerHTML = PLAY_ICON;
                });

                // Update progress bar
                audio.addEventListener('timeupdate', () => {
                    const progress = (audio.currentTime / audio.duration) * 100;
                    progressBar.style.width = progress + '%';
                    progressThumb.style.left = progress + '%';
                    currentTimeEl.textContent = formatTime(audio.currentTime);
                });

                // Set duration when metadata is loaded
                audio.addEventListener('loadedmetadata', () => {
                    durationEl.textContent = formatTime(audio.duration);
                });

                // Progress bar click and drag to seek
                let isDragging = false;
                let hasDragged = false;

                progressContainer.addEventListener('mousedown', (e) => {
                    isDragging = true;
                    hasDragged = false;
                    updateProgress(e);
                });

                document.addEventListener('mousemove', (e) => {
                    if (isDragging) {
                        hasDragged = true;
                        updateProgress(e);
                    }
                });

                document.addEventListener('mouseup', () => {
                    isDragging = false;
                });

                function updateProgress(e) {
                    const rect = progressContainer.getBoundingClientRect();
                    const pos = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                    audio.currentTime = pos * audio.duration;
                    audio.play();
                }

                // Progress bar hover tooltip
                progressContainer.addEventListener('mousemove', (e) => {
                    if (!audio.duration) return;
                    const rect = progressContainer.getBoundingClientRect();
                    const pos = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
                    const time = pos * audio.duration;
                    progressTooltip.textContent = formatTime(time);
                    progressTooltip.style.left = (pos * 100) + '%';
                    progressTooltip.classList.add('visible');
                });

                progressContainer.addEventListener('mouseleave', () => {
                    progressTooltip.classList.remove('visible');
                });

                // Volume control
                volumeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const isMuted = !audio.muted;
                    audio.muted = isMuted;

                    if (isMuted) {
                        volumeBtn.innerHTML = MUTE_ICON;
                        volumeSlider.value = 0;
                        volumeSlider.style.setProperty('--volume-percent', '0%');
                        volumeBtn.style.opacity = '0.5';
                    } else {
                        volumeBtn.innerHTML = VOLUME_ICON;
                        volumeSlider.value = lastVolume;
                        volumeSlider.style.setProperty('--volume-percent', (lastVolume * 100) + '%');
                        volumeBtn.style.opacity = '1';
                    }
                });

                volumeSlider.addEventListener('input', (e) => {
                    const volume = parseFloat(e.target.value);
                    audio.volume = volume;
                    lastVolume = volume;

                    if (volume > 0) {
                        audio.muted = false;
                        volumeBtn.innerHTML = VOLUME_ICON;
                        volumeBtn.style.opacity = '1';
                    } else {
                        audio.muted = true;
                        volumeBtn.innerHTML = MUTE_ICON;
                        volumeBtn.style.opacity = '0.5';
                    }

                    // Update slider color
                    volumeSlider.style.setProperty('--volume-percent', (volume * 100) + '%');
                });

                volumeSlider.addEventListener('click', (e) => {
                    e.stopPropagation();
                });

                const dropdownCloseMs = 150;

                function openSpeedDropdown() {
                    speedDropdown.classList.remove('is-closing');
                    speedDropdown.classList.add('is-open');
                }

                function closeSpeedDropdown() {
                    speedDropdown.classList.remove('is-open');
                    speedDropdown.classList.add('is-closing');
                    setTimeout(() => {
                        speedDropdown.classList.remove('is-closing');
                    }, dropdownCloseMs);
                }

                // Speed control
                speedBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    if (speedDropdown.classList.contains('is-open')) {
                        closeSpeedDropdown();
                    } else {
                        openSpeedDropdown();
                    }
                });

                // Close dropdowns when clicking outside
                document.addEventListener('click', () => {
                    closeSpeedDropdown();
                });

                speedOptions.forEach(option => {
                    option.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const speed = parseFloat(option.dataset.speed);
                        audio.playbackRate = speed;
                        speedBtn.textContent = speed + 'x';

                        // Update active state
                        speedOptions.forEach(opt => opt.classList.remove('active'));
                        option.classList.add('active');

                        closeSpeedDropdown();
                    });
                });

                return container;
            }

            function formatTime(seconds) {
                if (isNaN(seconds)) return '0:00';
                const mins = Math.floor(seconds / 60);
                const secs = Math.floor(seconds % 60);
                return mins + ':' + (secs < 10 ? '0' : '') + secs;
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            function getAudioType(url) {
                const urlLower = url.toLowerCase();
                if (urlLower.includes('.mp3')) return 'audio/mpeg';
                if (urlLower.includes('.m4a')) return 'audio/mp4';
                if (urlLower.includes('.wav')) return 'audio/wav';
                if (urlLower.includes('.ogg')) return 'audio/ogg';
                if (urlLower.includes('.aac')) return 'audio/aac';
                if (urlLower.includes('.flac')) return 'audio/flac';
                if (urlLower.includes('.opus')) return 'audio/opus';
                return 'audio/mpeg'; // Default
            }
        })();
    </script>
</body>

</html>
