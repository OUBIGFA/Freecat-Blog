<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <script><!-- THEME_SCRIPT --></script>
    <script src="https://cdn.jsdelivr.net/npm/beautiful-mermaid/dist/beautiful-mermaid.browser.global.js"></script>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title><!-- TITLE_PLACEHOLDER --> - <!-- SITE_TITLE --></title>
    <meta name="description" content="<!-- POST_DESCRIPTION -->" />
    <meta name="keywords" content="<!-- POST_KEYWORDS -->" />
    <link rel="canonical" href="<!-- POST_CANONICAL_URL -->" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="article" />
    <meta property="og:url" content="<!-- POST_CANONICAL_URL -->" />
    <meta property="og:title" content="<!-- TITLE_PLACEHOLDER --> - <!-- SITE_TITLE -->" />
    <meta property="og:description" content="<!-- POST_DESCRIPTION -->" />
    <meta property="og:image" content="<!-- POST_IMAGE -->" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="<!-- POST_CANONICAL_URL -->" />
    <meta property="twitter:title" content="<!-- TITLE_PLACEHOLDER --> - <!-- SITE_TITLE -->" />
    <meta property="twitter:description" content="<!-- POST_DESCRIPTION -->" />
    <meta property="twitter:image" content="<!-- POST_IMAGE -->" />

    <link rel="icon" href="<!-- SITE_FAVICON -->" />

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css" />
    <link rel="stylesheet" href="../assets/transitions.css" />
    <link rel="stylesheet" href="../assets/post.css" />
    <link rel="stylesheet" href="../assets/audio-player.css" />
    <style>
        /* highlight.js 深色主题覆盖（与外置主题保持兼容，单独留在模板里因为体量小） */
        .dark .hljs {
            background: transparent !important;
            color: #d6deeb !important;
        }

        .dark .hljs-comment,
        .dark .hljs-quote {
            color: #9aa8bd !important;
        }

        .dark .hljs-keyword,
        .dark .hljs-selector-tag,
        .dark .hljs-literal,
        .dark .hljs-built_in,
        .dark .hljs-type {
            color: #9cbde7 !important;
        }

        .dark .hljs-string,
        .dark .hljs-regexp,
        .dark .hljs-symbol,
        .dark .hljs-template-variable,
        .dark .hljs-addition {
            color: #a8d5c6 !important;
        }

        .dark .hljs-title,
        .dark .hljs-section,
        .dark .hljs-attr,
        .dark .hljs-attribute {
            color: #e6c38a !important;
        }

        .dark .hljs-number,
        .dark .hljs-bullet {
            color: #e7a5a5 !important;
        }

        .dark .hljs-variable,
        .dark .hljs-name,
        .dark .hljs-selector-id,
        .dark .hljs-selector-class,
        .dark .hljs-meta,
        .dark .hljs-link,
        .dark .hljs-deletion {
            color: #b8b0dd !important;
        }

        .dark .hljs-subst,
        .dark .hljs-tag,
        .dark .hljs-doctag,
        .dark .hljs-meta-keyword,
        .dark .hljs-meta-string,
        .dark .hljs-params,
        .dark .hljs-emphasis,
        .dark .hljs-strong {
            color: #d6deeb !important;
        }
    </style>

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <script id="tailwind-config">
        /* TAILWIND_CONFIG_PLACEHOLDER */
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-[#111318] dark:text-slate-200 transition-colors duration-200">
    <div class="relative flex h-auto min-h-screen w-full flex-col">

        <!-- INCLUDE:header -->

        <main class="page-blur-target flex-grow mt-[40px] md:mt-[60px]">
            <div class="max-w-[1440px] mx-auto px-8 sm:px-10 lg:px-8 pt-3 pb-36 md:pt-4 lg:pb-48">
                <div class="grid grid-cols-1 lg:grid-cols-[minmax(0,1fr)_minmax(0,768px)_minmax(0,1fr)] gap-12">
                    <!-- Left Spacer: Sticky container for floating Go Back button -->
                    <div class="hidden lg:block relative">
                        <div class="sticky top-1/2 -translate-y-1/2 flex flex-col items-center">
                            <button id="floating-go-back" aria-label="Go Back"
                                class="t-btn-icon group relative flex items-center justify-center rounded-full size-12 bg-[#fcfcfd] dark:bg-card-dark text-slate-400 dark:text-slate-500 hover:text-primary dark:hover:text-primary opacity-0 invisible -translate-x-4">
                                <span class="text-2xl t-btn-arrow-prev">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                                        width="1em" height="1em">
                                        <path
                                            d="M10.8284 12.0007L15.7782 16.9504L14.364 18.3646L8 12.0007L14.364 5.63672L15.7782 7.05093L10.8284 12.0007Z">
                                        </path>
                                    </svg>
                                </span>
                            </button>
                        </div>
                    </div>

                    <article class="min-w-0">
                        <header class="mb-8 pt-6">
                            <a href="/"
                                onclick="if(document.referrer && document.referrer.includes(window.location.host)){history.back();return false;}"
                                class="t-btn t-btn-primary group inline-flex items-center gap-2 px-4 h-10 rounded-full border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-primary hover:text-slate-50 hover:border-primary mb-12">
                                <svg class="text-xl text-slate-400 dark:text-slate-500 t-btn-arrow-prev"
                                    xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                                    width="1em" height="1em">
                                    <path
                                        d="M10.8284 12.0007L15.7782 16.9504L14.364 18.3646L8 12.0007L14.364 5.63672L15.7782 7.05093L10.8284 12.0007Z">
                                    </path>
                                </svg>
                                <span class="text-sm font-bold">Go Back</span>
                            </a>
                            <div class="flex flex-wrap gap-2 mb-3">
                                <!-- TAGS_PLACEHOLDER -->
                            </div>
                            <h1 class="post-title font-black tracking-tight text-slate-900 dark:text-slate-200">
                                <!-- TITLE_H1_PLACEHOLDER -->
                            </h1>
                            <div class="flex items-center gap-4 text-sm text-slate-500 dark:text-slate-400">
                                <div class="flex items-center gap-2">
                                    <svg class="text-[18px]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                        fill="currentColor" width="1em" height="1em">
                                        <path
                                            d="M7 3V1H9V3H15V1H17V3H21C21.5523 3 22 3.44772 22 4V9H20V5H17V7H15V5H9V7H7V5H4V19H10V21H3C2.44772 21 2 20.5523 2 20V4C2 3.44772 2.44772 3 3 3H7ZM17 12C14.7909 12 13 13.7909 13 16C13 18.2091 14.7909 20 17 20C19.2091 20 21 18.2091 21 16C21 13.7909 19.2091 12 17 12ZM11 16C11 12.6863 13.6863 10 17 10C20.3137 10 23 12.6863 23 16C23 19.3137 20.3137 22 17 22C13.6863 22 11 19.3137 11 16ZM16 13V16.4142L18.2929 18.7071L19.7071 17.2929L18 15.5858V13H16Z">
                                        </path>
                                    </svg>
                                    <time><!-- DATE_PLACEHOLDER --></time>
                                </div>
                                <span class="w-1 h-1 rounded-full bg-slate-300 dark:bg-slate-600"></span>
                                <div class="flex items-center gap-2">
                                    <svg class="text-[18px]" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
                                        fill="currentColor" width="1em" height="1em">
                                        <path
                                            d="M6.93912 14.0328C6.7072 14.6563 6.51032 15.2331 6.33421 15.8155C7.29345 15.1189 8.43544 14.6767 9.75193 14.5121C12.2652 14.198 14.4976 12.5385 15.6279 10.4537L14.1721 8.99888L15.5848 7.58417C15.9185 7.25004 16.2521 6.91614 16.5858 6.58248C17.0151 6.15312 17.5 5.35849 18.0129 4.2149C12.4197 5.08182 8.99484 8.50647 6.93912 14.0328ZM17 8.99739L18 9.99669C17 12.9967 14 15.9967 10 16.4967C7.33146 16.8303 5.66421 18.6636 4.99824 21.9967H3C4 15.9967 6 1.99669 21 1.99669C20.0009 4.99402 19.0018 6.99313 18.0027 7.99402C17.6662 8.33049 17.3331 8.66382 17 8.99739Z">
                                        </path>
                                    </svg>
                                    <span>最后编辑: <!-- MODIFIED_PLACEHOLDER --></span>
                                </div>
                            </div>
                            <!-- 粗横线分隔线 -->
                            <div class="w-full h-1 bg-slate-200 dark:bg-slate-700 rounded-full mt-6"></div>
                        </header>

                        <!-- COVER_PLACEHOLDER -->

                        <div
                            class="prose prose-2xl dark:prose-invert !mt-0 max-w-none prose-p:text-slate-600 dark:prose-p:text-slate-300 prose-headings:text-slate-900 dark:prose-headings:text-slate-400 prose-a:text-primary prose-a:underline prose-a:underline-offset-4 hover:prose-a:text-blue-500 prose-strong:text-slate-900 dark:prose-strong:text-slate-200">
                            <!-- CONTENT_PLACEHOLDER -->
                        </div>

                        <!-- Share Button -->
                        <div class="flex justify-center mt-12 mb-8">
                            <button id="share-btn" aria-label="Share Article"
                                class="t-btn t-btn-primary group relative inline-flex items-center gap-3 px-6 py-3 rounded-full bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-600 dark:text-slate-400 hover:bg-primary hover:text-white hover:border-primary dark:hover:bg-primary dark:hover:text-white dark:hover:border-primary">
                                <svg class="w-5 h-5 t-btn-arrow-next"
                                    xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
                                    <path
                                        d="M13 14H11C7.54202 14 4.53953 15.9502 3.03239 18.8107C3.01093 18.5433 3 18.2729 3 18C3 12.4772 7.47715 8 13 8V3L23 11L13 19V14Z">
                                    </path>
                                </svg>
                                <span class="text-sm font-bold">Share</span>
                            </button>
                        </div>
                    </article>

                    <div class="hidden lg:block relative">
                        <aside
                            class="w-64 flex-shrink-0 sticky top-32 h-[calc(100vh-300px)] self-start relative group/toc lg:mt-[68px]">
                            <!-- 目录标题固定 -->
                            <h3 class="text-sm font-bold tracking-wider text-slate-500 dark:text-slate-400 mb-4">
                                目录
                            </h3>
                            <!-- 只有列表区域可滚动，美化滚动条 -->
                            <div id="toc-container" class="max-h-[calc(100vh-320px)] overflow-y-auto pr-2 custom-scrollbar">
                                <nav class="flex flex-col gap-1 border-l border-slate-200 dark:border-slate-700">
                                    <!-- TOC_PLACEHOLDER -->
                                </nav>
                            </div>
                        </aside>
                        <div class="pointer-events-none sticky top-1/2 -translate-y-1/2 flex justify-end">
                            <div class="pointer-events-auto -mr-16 flex flex-col gap-4">
                                <button id="back-to-top" aria-label="Back to Top"
                                    class="t-btn-icon group relative flex items-center justify-center rounded-full size-12 bg-[#fcfcfd] dark:bg-card-dark text-slate-400 dark:text-slate-500 hover:text-primary dark:hover:text-primary opacity-0 invisible translate-x-4">
                                    <span class="text-2xl t-btn-arrow-up">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                                            width="1em" height="1em">
                                            <path
                                                d="M11.9999 10.8284L7.0502 15.7782L5.63599 14.364L11.9999 8L18.3639 14.364L16.9497 15.7782L11.9999 10.8284Z">
                                            </path>
                                        </svg>
                                    </span>
                                </button>
                                <button id="scroll-to-bottom" aria-label="Scroll to Bottom"
                                    class="t-btn-icon group relative flex items-center justify-center rounded-full size-12 bg-[#fcfcfd] dark:bg-card-dark text-slate-400 dark:text-slate-500 hover:text-primary dark:hover:text-primary opacity-0 invisible translate-x-4">
                                    <span class="text-2xl t-btn-arrow-down">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                                            width="1em" height="1em">
                                            <path
                                                d="M11.9999 13.1714L16.9497 8.22168L18.3639 9.63589L11.9999 15.9999L5.63599 9.63589L7.0502 8.22168L11.9999 13.1714Z">
                                            </path>
                                        </svg>
                                    </span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- INCLUDE:footer -->
    </div>

    <script src="../assets/shared.js"></script>
    <script src="../assets/post-card-template.js"></script>
    <script src="../assets/main.js"></script>
    <script src="../assets/post.js"></script>
    <script src="../assets/audio-player.js"></script>
</body>

</html>
