<style>
        :root {
            /* 注：--freecat-header-height / --freecat-header-safe-gap / --freecat-page-top-offset
               已在 assets/transitions.css 中作为全站默认值定义，这里只补充首页专属变量。 */
            --freecat-canvas: #f6f6f8;
            --freecat-hero-canvas: #fafbfc;
            /* sidebar 自身宽度独立，与 inner 居中无关 */
            --freecat-home-sidebar-width: clamp(420px, 24vw, 500px);
            /* sidebar 内的内容尺寸独立，与 sidebar 宽度无关（只要 sidebar 装得下即可） */
            --freecat-hero-avatar-size: clamp(180px, 14vw, 260px);
            --freecat-hero-title-size: clamp(1.625rem, 2vw, 2rem);
            --freecat-hero-text-max: 420px;
            /* 文章 inner 的目标最大宽度；实际宽度还受"不被 sidebar 遮挡"约束。 */
            --freecat-home-content-max: 1100px;
        }

        .dark {
            --freecat-canvas: #101622;
            --freecat-hero-canvas: #151d2a;
        }

        .freecat-home-stage {
            background: var(--freecat-canvas);
            isolation: isolate;
            overflow-x: clip;
        }

        .freecat-home-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .freecat-home-sidebar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.75rem;
            min-width: 0;
            background: var(--freecat-hero-canvas);
        }

        .freecat-home-sidebar-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.75rem;
            width: 100%;
            min-width: 0;
        }

        .freecat-home-sidebar-bottom {
            width: 100%;
            min-width: 0;
        }

        .freecat-home-sidebar-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.75rem;
            width: 100%;
        }

        .freecat-home-sidebar-hero-text {
            width: 100%;
            text-align: left;
        }

        .freecat-home-sidebar-hero-text h1,
        .freecat-home-sidebar-hero-text h2 {
            text-align: left;
        }

        .freecat-home-sidebar-recent {
            width: 100%;
        }

        .freecat-home-posts {
            min-width: 0;
            width: 100%;
            background: var(--freecat-canvas);
        }

        .freecat-hero-avatar {
            background-color: color-mix(in srgb, white 82%, var(--freecat-hero-canvas));
            aspect-ratio: 1 / 1;
            border-radius: 50% !important;
        }

        /* 桌面端：sidebar 用 position: fixed 钉在视口左侧，整列从顶到底铺满；
           不随页面滚动，footer 滚入时由更高的 z-index 自然覆盖在它之上。
           最近更新跟随介绍靠上排列。 */
        @media (min-width: 1024px) {
            .freecat-home-layout {
                position: relative;
                min-height: calc(100vh - var(--freecat-header-height, 80px));
            }

            .freecat-home-sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: var(--freecat-home-sidebar-width);
                background: var(--freecat-hero-canvas);
                display: flex;
                flex-direction: column;
                gap: 0;
                padding: calc(var(--freecat-page-top-offset, 112px) + 40px) clamp(44px, 3.2vw, 64px) 1.5rem;
                z-index: 1;
                overflow: hidden;
            }

            .freecat-home-sidebar-top {
                padding-bottom: 0;
                flex: 0 0 auto;
            }

            /* sidebar-bottom 占用剩余高度并允许收缩；溢出时底部用渐变遮罩做"省略号"效果 */
            .freecat-home-sidebar-bottom {
                margin-top: clamp(2rem, 5vh, 4rem);
                padding-bottom: 0;
                flex: 1 1 auto;
                min-height: 0;
                overflow: hidden;
                -webkit-mask-image: linear-gradient(to bottom, #000 0, #000 calc(100% - 32px), transparent 100%);
                mask-image: linear-gradient(to bottom, #000 0, #000 calc(100% - 32px), transparent 100%);
            }

            .freecat-home-sidebar-recent {
                margin-top: 0;
                padding-top: 0;
                max-width: var(--freecat-hero-text-max);
            }

            .freecat-home-sidebar-hero-text {
                max-width: var(--freecat-hero-text-max);
            }

            .freecat-home-posts {
                /* 跨整个视口；left padding 把 inner 推到 sidebar 右侧，
                   宽屏时则把 inner 居中于整个视口（sidebar 自然被覆盖在下层）。 */
                width: 100%;
                padding:
                    calc(var(--freecat-page-top-offset, 112px) + 40px)
                    0
                    56px
                    max(
                        var(--freecat-home-sidebar-width),
                        calc((100vw - var(--freecat-home-content-max)) / 2)
                    );
            }

            /* 自适应规则：先保宽度，再让位，最后等比缩小（保持卡片内部比例）；
               - 视口够宽（≥ inner_max + 2*sidebar）时，inner 居中于整个视口；
               - 视口收窄时，inner 保持原尺寸不压缩，整体向右"贴"sidebar 右侧；
               - 直到 inner 右边触到视口右缘后（视口 < inner_max + sidebar），
                 用 zoom 等比缩小，卡片图片/文字/留白同比例缩，绝不单向压宽。 */
            .freecat-home-posts-inner {
                width: var(--freecat-home-content-max);
                max-width: var(--freecat-home-content-max);
                padding: 0 clamp(16px, 1.6vw, 28px);
                zoom: min(
                    1,
                    calc(
                        (100vw - var(--freecat-home-sidebar-width))
                        / var(--freecat-home-content-max)
                    )
                );
            }

            /* 底部分页器：跨整个视口居中（与 footer 视觉一致），
               用 negative margin-left 抵消 posts 的 padding-left，避免被 sidebar 推偏。 */
            .freecat-home-pagination {
                margin-left: calc(-1 * max(
                    var(--freecat-home-sidebar-width),
                    (100vw - var(--freecat-home-content-max)) / 2
                ));
                width: 100vw;
            }
        }

        /* 移动端 / 平板：单列堆叠；最近更新整段隐藏；sidebar 自己 padding-top 让位顶栏。 */
        @media (max-width: 1023px) {
            :root {
                --freecat-hero-avatar-size: clamp(180px, 36vw, 240px);
                --freecat-hero-title-size: clamp(1.5rem, 6vw, 2rem);
            }

            .freecat-home-sidebar {
                box-sizing: border-box;
                width: 100%;
                padding: calc(var(--freecat-page-top-offset, 96px) + 12px) clamp(20px, 5vw, 36px) clamp(8px, 2vw, 14px);
            }

            .freecat-home-sidebar-hero,
            .freecat-home-sidebar-hero-text {
                min-width: 0;
            }

            .freecat-home-sidebar-hero-text {
                max-width: min(100%, 19rem);
                margin-inline: auto;
            }

            .freecat-home-sidebar-hero-text,
            .freecat-home-sidebar-hero-text h1,
            .freecat-home-sidebar-hero-text h2 {
                text-align: center;
            }

            .freecat-home-sidebar-hero-text h1,
            .freecat-home-sidebar-hero-text h2 {
                max-width: 100%;
                overflow-wrap: break-word;
                word-break: normal;
                text-wrap: balance;
                white-space: normal;
            }

            .freecat-home-posts {
                padding: 0 clamp(20px, 5vw, 40px) 48px;
            }

            body:not([data-page="home"]) .freecat-home-sidebar {
                display: none;
            }

            body:not([data-page="home"]) .freecat-home-posts {
                padding-top: calc(var(--freecat-page-top-offset, 96px) + 12px);
            }

            .freecat-home-sidebar-recent {
                display: none;
            }
        }

        /* 首页第一屏不展示分页头时，移除其占位空白；
           构建器把占位符替换成空字符串，HTML 缩进会留下文本节点，
           所以用 :not(:has(*)) 才能真正命中"没有元素子节点"的状态。 */
        #view-all-header:empty,
        #view-all-header:not(:has(*)) {
            display: none;
            margin: 0;
            padding: 0;
            border: 0;
        }
    </style>
