<!-- partials/floating-nav.html · 全站统一的浮动按钮块（返回顶部 / 落到底部 / 返回上一页）
     位置 / 显隐 / 过渡均由 .freecat-floating-nav-panel + .t-floating-nav 控制。
     首页（body[data-page="home"]）通过 CSS 隐藏 #floating-go-back。 -->
<div class="freecat-floating-nav-panel">
    <div class="flex flex-1 flex-col justify-center gap-4">
        <button id="back-to-top" aria-label="Back to Top"
            class="t-btn-icon t-floating-nav group relative flex items-center justify-center rounded-full size-12 bg-[#fcfcfd] dark:bg-card-dark text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300">
            <span class="text-2xl t-btn-arrow-up">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="1em" height="1em">
                    <path d="M11.9999 10.8284L7.0502 15.7782L5.63599 14.364L11.9999 8L18.3639 14.364L16.9497 15.7782L11.9999 10.8284Z"></path>
                </svg>
            </span>
        </button>
        <button id="scroll-to-bottom" aria-label="Scroll to Bottom"
            class="t-btn-icon t-floating-nav group relative flex items-center justify-center rounded-full size-12 bg-[#fcfcfd] dark:bg-card-dark text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300">
            <span class="text-2xl t-btn-arrow-down">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="1em" height="1em">
                    <path d="M11.9999 13.1714L16.9497 8.22168L18.3639 9.63589L11.9999 15.9999L5.63599 9.63589L7.0502 8.22168L11.9999 13.1714Z"></path>
                </svg>
            </span>
        </button>
    </div>
    <button id="floating-go-back" aria-label="Go Back"
        class="t-btn-icon t-floating-nav group relative flex items-center justify-center rounded-full size-12 bg-[#fcfcfd] dark:bg-card-dark text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300">
        <span class="text-2xl t-btn-arrow-prev">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="1em" height="1em">
                <path d="M10.8284 12.0007L15.7782 16.9504L14.364 18.3646L8 12.0007L14.364 5.63672L15.7782 7.05093L10.8284 12.0007Z"></path>
            </svg>
        </span>
    </button>
</div>
