                    <div id="hero-section" class="freecat-home-sidebar-top freecat-home-sidebar-hero @container">

                        <div class="freecat-home-sidebar-hero-text flex flex-col gap-3">

                                <!-- HERO_TITLE -->
                            </h1>
                            <h2
                                class="animate-fade-in-up delay-150 text-[#616f89] dark:text-gray-400 text-sm lg:text-[15px] font-normal leading-relaxed">
                                <!-- HERO_SUBTITLE -->
                            </h2>
                        </div>
                    </div>
                    <div class="freecat-home-sidebar-bottom">

                        </div>
