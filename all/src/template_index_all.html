<!DOCTYPE html>
<html lang="<!-- SITE_LANGUAGE -->">

<head>
    <!-- INCLUDE:head-base -->
    <title>All Articles - <!-- SITE_TITLE --></title>
    <!-- ALL_SEO_HEAD -->
    <style>
        .freecat-all-page .layout-container {
            padding-left: clamp(1rem, 3vw, 3rem);
            padding-right: clamp(1rem, 3vw, 3rem);
        }

        .freecat-all-page .layout-content-container {
            max-width: 1560px;
        }

        .freecat-all-page #posts-list {
            display: grid;
            grid-template-columns: 1fr;
            column-gap: 1rem;
            row-gap: 1.25rem;
        }

        .freecat-all-page #posts-list .post-card {
            height: 100%;
            margin: 0;
            min-width: 0;
        }

        .freecat-all-page #posts-list .post-card > div {
            height: 100%;
            min-height: 0;
            padding: 1.25rem;
            border-radius: 8px;
        }

        .freecat-all-page #posts-list .post-card.has-no-cover > div {
            min-height: clamp(21rem, 27vw, 23.4rem);
        }

        .freecat-all-page #posts-list .post-card .lg\:hidden {
            display: flex !important;
            height: 100%;
        }

        .freecat-all-page #posts-list .post-card .lg\:grid {
            display: none !important;
        }

        .freecat-all-page #posts-list .post-card h3 {
            font-size: 1.25rem !important;
            line-height: 1.24 !important;
            font-weight: 700 !important;
            min-height: 3.1rem;
        }

        .freecat-all-page #posts-list .post-card p {
            margin-top: 1rem !important;
            font-size: 0.875rem !important;
            line-height: 1.65 !important;
            -webkit-line-clamp: 2 !important;
            min-height: 2.9rem;
        }

        .freecat-all-page #posts-list .post-card.has-no-cover p {
            -webkit-line-clamp: 9 !important;
            min-height: 12.995rem;
        }

        .freecat-all-page #posts-list .post-card h3 + div {
            margin-top: 0.625rem !important;
            min-height: 1.25rem;
            overflow: hidden;
        }

        .freecat-all-page #posts-list .post-card.tags-inline-mobile h3 + div {
            min-height: 1.625rem;
            column-gap: 0.875rem;
            row-gap: 0.375rem;
            overflow: visible;
        }

        .freecat-all-page #posts-list .post-card .mt-7.shrink-0 {
            margin-top: 1rem !important;
        }

        .freecat-all-page #posts-list .post-card .mt-8.h-\[196px\] {
            height: clamp(8.75rem, 12vw, 10.75rem) !important;
            margin-top: 1rem !important;
            border-radius: 8px !important;
        }

        .freecat-all-page #posts-list .post-card.tags-inline-mobile .mt-8.h-\[196px\] {
            height: clamp(11.25rem, 14.5vw, 13.25rem) !important;
        }

        .freecat-all-page #posts-list .post-card .tags-fit {
            overflow: hidden;
        }

        .freecat-all-page #posts-list .post-card .tags-fit > * {
            flex: 0 1 auto;
            min-width: 0;
        }

        .freecat-all-page #posts-list .post-card.tags-inline-mobile .tags-fit {
            max-width: 100%;
            overflow: visible;
            transform-origin: left center;
        }

        .freecat-all-page #posts-list .post-card.tags-inline-mobile .tags-fit > * {
            line-height: 1.2;
            padding-left: clamp(0.35rem, 0.7vw, 0.625rem) !important;
            padding-right: clamp(0.35rem, 0.7vw, 0.625rem) !important;
        }

        .freecat-all-switch-label {
            display: inline-flex;
            align-items: center;
            gap: 0.625rem;
            color: #475569;
            font-size: 0.8125rem;
            font-weight: 600;
            line-height: 1.2;
        }

        .dark .freecat-all-switch-label {
            color: #cbd5e1;
        }

        .freecat-all-switch {
            position: relative;
            display: inline-flex;
            align-items: center;
            width: 2.5rem;
            height: 1.375rem;
            flex: none;
            border: 1px solid rgba(148, 163, 184, 0.24);
            border-radius: 999px;
            background: #edf1f5;
            transition: background-color 160ms ease, border-color 160ms ease;
        }

        .freecat-all-switch::after {
            content: "";
            width: 1rem;
            height: 1rem;
            margin-left: 0.125rem;
            border-radius: 999px;
            background: #ffffff;
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.18);
            transition: transform 160ms ease;
        }

        .freecat-all-switch[aria-checked="true"] {
            border-color: rgba(100, 116, 139, 0.28);
            background: #334155;
        }

        .freecat-all-switch[aria-checked="true"]::after {
            transform: translateX(1.125rem);
        }

        .freecat-all-switch:focus-visible {
            outline: 2px solid rgba(51, 65, 85, 0.42);
            outline-offset: 2px;
        }

        .dark .freecat-all-switch {
            border-color: rgba(148, 163, 184, 0.26);
            background: #334155;
        }

        .dark .freecat-all-switch[aria-checked="true"] {
            border-color: rgba(203, 213, 225, 0.3);
            background: #cbd5e1;
        }

        .dark .freecat-all-switch[aria-checked="true"]::after {
            background: #0f172a;
        }

        @media (min-width: 720px) {
            .freecat-all-page #posts-list {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                column-gap: 1.125rem;
                row-gap: 1.5rem;
            }
        }

        @media (min-width: 1120px) {
            .freecat-all-page #posts-list {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                column-gap: 1.25rem;
                row-gap: 1.75rem;
            }
        }

        @media (max-width: 480px) {
            .freecat-all-page .layout-container {
                padding-left: 0.875rem;
                padding-right: 0.875rem;
            }

            .freecat-all-page #posts-list .post-card > div {
                padding: 1rem;
            }

            .freecat-all-page #posts-list .post-card.has-no-cover > div {
                min-height: 18.5rem;
            }

            .freecat-all-page #posts-list .post-card h3 {
                font-size: 1.125rem !important;
                min-height: 2.8rem;
            }

            .freecat-all-page #posts-list .post-card.has-no-cover p {
                -webkit-line-clamp: 9 !important;
                min-height: 12.995rem;
            }

            .freecat-all-page #posts-list .post-card .mt-8.h-\[196px\] {
                height: 9rem !important;
            }

            .freecat-all-page #posts-list .post-card.tags-inline-mobile .mt-8.h-\[196px\] {
                height: 11.5rem !important;
            }

            .freecat-all-page [data-all-toolbar] {
                align-items: flex-start;
                flex-direction: column;
                gap: 0.875rem;
            }

            .freecat-all-page [data-all-sort-controls] {
                flex-wrap: wrap;
                gap: 0.625rem;
            }
        }
    </style>
</head>

<body
    class="freecat-all-page bg-background-light dark:bg-background-dark font-display text-[#1e293b] dark:text-slate-200 transition-colors duration-200">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">

        <!-- INCLUDE:header -->

        <!-- 主内容区
             用 CSS 变量 --freecat-page-top-offset（= header 高度 + 安全间距，
             定义在 assets/transitions.css 中）作为 margin-top，
             保证首屏渲染就避开固定顶栏；JS 仍会按真实 header 尺寸做实时同步。 -->
        <div data-floating-nav-container
            class="layout-container page-blur-target mt-[var(--freecat-page-top-offset)] flex h-full grow flex-col px-10 sm:px-12 md:px-20 lg:px-12 pt-3 pb-20 md:pt-4 md:pb-24">
            <div class="layout-content-container relative flex flex-col max-w-[1200px] flex-1 mx-auto w-full">
                <h1 class="sr-only">All Articles</h1>

                <div data-all-toolbar
                    class="flex items-center justify-between gap-4 pb-6 pt-6 mb-12">
                    <a href="/" data-go-back
                        class="group inline-flex items-center gap-2 h-10 text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300 transition-colors duration-150">
                        <svg class="text-xl t-btn-arrow-prev"
                            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="1em"
                            height="1em">
                            <path
                                d="M10.8284 12.0007L15.7782 16.9504L14.364 18.3646L8 12.0007L14.364 5.63672L15.7782 7.05093L10.8284 12.0007Z">
                            </path>
                        </svg>
                        <span class="text-sm font-bold">Go Back</span>
                    </a>
                    <div data-all-sort-controls class="flex items-center gap-2">
                        <div class="freecat-all-switch-label">
                            <button type="button" class="freecat-all-switch" data-update-sort-switch role="switch"
                                aria-checked="false" aria-label="按更新排序"></button>
                            <span>按更新排序</span>
                        </div>
                    </div>
                </div>

                <!-- === 动态文章注入区（显示所有文章，无分页） === -->
                <div id="posts-list">
                    <!-- ALL_POSTS_LIST_PLACEHOLDER -->
                </div>
                <!-- ===================== -->

            </div>
        </div>

        <!-- INCLUDE:floating-nav -->

        <!-- INCLUDE:footer -->
    </div>

    <!-- INCLUDE:scripts-end -->
    <script>
        (function () {
            const list = document.getElementById('posts-list');
            const updateSortSwitch = document.querySelector('[data-update-sort-switch]');
            if (!list || !updateSortSwitch) return;

            const cards = Array.from(list.querySelectorAll('.post-card')).map((card, index) => ({ card, index }));
            const getCardDelay = (index) => `${Math.min(index, 10) * 70}ms`;
            const prefersReducedMotion = () => window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            const replayEntrance = (sortedCards) => {
                sortedCards.forEach(({ card }, index) => {
                    card.style.animationDelay = getCardDelay(index);
                    if (!prefersReducedMotion()) {
                        card.classList.remove('animate-fade-in-up');
                    }
                });
                if (prefersReducedMotion()) return;

                void list.offsetWidth;
                sortedCards.forEach(({ card }) => {
                    card.classList.add('animate-fade-in-up');
                });
            };

            const sortCards = (mode) => {
                const sortedCards = cards
                    .sort((a, b) => {
                        const pinnedDelta = mode === 'date'
                            ? Number(b.card.dataset.sortPinned || 0) - Number(a.card.dataset.sortPinned || 0)
                            : 0;
                        const field = mode === 'modified' ? 'sortModified' : 'sortDate';
                        const delta = pinnedDelta || Number(b.card.dataset[field] || 0) - Number(a.card.dataset[field] || 0);
                        return delta || a.index - b.index;
                    });

                sortedCards.forEach(({ card }) => list.appendChild(card));

                updateSortSwitch.setAttribute('aria-checked', String(mode === 'modified'));
                replayEntrance(sortedCards);
            };

            updateSortSwitch.addEventListener('click', () => {
                const useModifiedSort = updateSortSwitch.getAttribute('aria-checked') !== 'true';
                sortCards(useModifiedSort ? 'modified' : 'date');
            });
        }());
    </script>
</body>

</html>
