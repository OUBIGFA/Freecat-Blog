<!DOCTYPE html>
<html lang="<!-- SITE_LANGUAGE -->">

<head>
    <!-- INCLUDE:head-base -->
    <title>All Articles - <!-- SITE_TITLE --></title>
    <!-- ALL_SEO_HEAD -->
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-[#111318] dark:text-slate-200 transition-colors duration-200">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">

        <!-- INCLUDE:header -->

        <!-- 主内容区
             用 CSS 变量 --freecat-page-top-offset（= header 高度 + 安全间距，
             定义在 assets/transitions.css 中）作为 margin-top，
             保证首屏渲染就避开固定顶栏；JS 仍会按真实 header 尺寸做实时同步。 -->
        <div
            class="layout-container page-blur-target mt-[var(--freecat-page-top-offset)] flex h-full grow flex-col px-10 sm:px-12 md:px-20 lg:px-12 pt-3 pb-2 md:pt-4">
            <div class="layout-content-container flex flex-col max-w-[1200px] flex-1 mx-auto w-full">
                <h1 class="sr-only">All Articles</h1>

                <div
                    class="flex items-center justify-start gap-4 pb-6 pt-6 border-b border-gray-300 dark:border-gray-800 mb-12">
                    <a href="/"
                        onclick="if(document.referrer.includes(window.location.host)){history.back();return false;}"
                        class="group inline-flex items-center gap-2 h-10 text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300 transition-colors duration-150">
                        <svg class="text-xl t-btn-arrow-prev"
                            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="1em"
                            height="1em">
                            <path
                                d="M10.8284 12.0007L15.7782 16.9504L14.364 18.3646L8 12.0007L14.364 5.63672L15.7782 7.05093L10.8284 12.0007Z">
                            </path>
                        </svg>
                        <span class="text-sm font-bold">Go Back</span>
                    </a>
                </div>

                <!-- === 动态文章注入区（显示所有文章，无分页） === -->
                <div id="posts-list">
                    <!-- ALL_POSTS_LIST_PLACEHOLDER -->
                </div>
                <!-- ===================== -->

            </div>
        </div>

        <!-- INCLUDE:footer -->
    </div>

    <!-- INCLUDE:scripts-end -->
</body>

</html>
