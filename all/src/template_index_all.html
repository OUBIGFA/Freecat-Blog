<!DOCTYPE html>
<html lang="<!-- SITE_LANGUAGE -->">

<head>
    <!-- INCLUDE:head-base -->
    <title>All Articles - <!-- SITE_TITLE --></title>
    <!-- ALL_SEO_HEAD -->
    <style>
        .freecat-all-page .layout-container {
            padding-left: clamp(1rem, 3vw, 3rem);
            padding-right: clamp(1rem, 3vw, 3rem);
        }

        .freecat-all-page .layout-content-container {
            max-width: 1560px;
        }

        .freecat-all-page #posts-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1rem;
        }

        .freecat-all-page #posts-list .post-card {
            height: 100%;
            margin: 0;
            min-width: 0;
        }

        .freecat-all-page #posts-list .post-card > div {
            height: 100%;
            min-height: 0;
            padding: 1.25rem;
            border: 1px solid rgba(148, 163, 184, 0.22);
            border-radius: 1rem;
        }

        .freecat-all-page #posts-list .post-card.has-no-cover > div {
            min-height: clamp(21rem, 27vw, 23.4rem);
        }

        .freecat-all-page #posts-list .post-card .lg\:hidden {
            display: flex !important;
            height: 100%;
        }

        .freecat-all-page #posts-list .post-card .lg\:grid {
            display: none !important;
        }

        .freecat-all-page #posts-list .post-card h3 {
            font-size: 1.25rem !important;
            line-height: 1.24 !important;
            font-weight: 700 !important;
            min-height: 3.1rem;
        }

        .freecat-all-page #posts-list .post-card p {
            margin-top: 1rem !important;
            font-size: 0.875rem !important;
            line-height: 1.65 !important;
            -webkit-line-clamp: 2 !important;
            min-height: 2.9rem;
        }

        .freecat-all-page #posts-list .post-card.has-no-cover p {
            -webkit-line-clamp: 9 !important;
            min-height: 12.995rem;
        }

        .freecat-all-page #posts-list .post-card h3 + div {
            margin-top: 0.625rem !important;
            min-height: 1.25rem;
            overflow: hidden;
        }

        .freecat-all-page #posts-list .post-card .mt-7.shrink-0 {
            margin-top: 1rem !important;
        }

        .freecat-all-page #posts-list .post-card .mt-8.h-\[180px\] {
            height: clamp(8.75rem, 12vw, 10.75rem) !important;
            margin-top: 1rem !important;
            border-radius: 0.875rem !important;
        }

        .freecat-all-page #posts-list .post-card .mt-4.shrink-0 {
            margin-top: 1rem !important;
            border-top: 0 !important;
        }

        .freecat-all-page #posts-list .post-card.has-no-cover .mt-4.shrink-0 {
            margin-top: auto !important;
        }

        .freecat-all-page #posts-list .post-card .tags-fit {
            overflow: hidden;
        }

        .freecat-all-page #posts-list .post-card .tags-fit > * {
            flex: 0 1 auto;
            min-width: 0;
        }

        .freecat-all-floating-nav {
            display: none;
        }

        .freecat-all-sort {
            display: inline-flex;
            align-items: center;
            gap: 0.3125rem;
            height: 1.875rem;
            padding: 0 0.5rem;
            border: 1px solid rgba(148, 163, 184, 0.32);
            border-radius: 999px;
            color: #64748b;
            background: transparent;
            font-size: 0.6875rem;
            font-weight: 600;
            line-height: 1;
            transition: color 150ms ease, border-color 150ms ease, background-color 150ms ease;
        }

        .freecat-all-sort:hover,
        .freecat-all-sort[aria-pressed="true"] {
            color: #334155;
            border-color: rgba(100, 116, 139, 0.42);
            background: rgba(241, 245, 249, 0.68);
        }

        .dark .freecat-all-sort {
            color: #94a3b8;
            border-color: rgba(71, 85, 105, 0.62);
        }

        .dark .freecat-all-sort:hover,
        .dark .freecat-all-sort[aria-pressed="true"] {
            color: #e2e8f0;
            border-color: rgba(148, 163, 184, 0.46);
            background: rgba(30, 41, 59, 0.64);
        }

        .freecat-all-sort svg {
            width: 0.875rem;
            height: 0.875rem;
            flex: none;
        }

        @media (min-width: 720px) {
            .freecat-all-page #posts-list {
                grid-template-columns: repeat(2, minmax(0, 1fr));
                gap: 1.125rem;
            }
        }

        @media (min-width: 1120px) {
            .freecat-all-page #posts-list {
                grid-template-columns: repeat(3, minmax(0, 1fr));
                gap: 1.25rem;
            }
        }

        @media (min-width: 1760px) {
            .freecat-all-floating-nav {
                display: flex;
                left: calc(50% + 780px + 3rem);
                right: auto;
            }
        }

        @media (max-width: 480px) {
            .freecat-all-page .layout-container {
                padding-left: 0.875rem;
                padding-right: 0.875rem;
            }

            .freecat-all-page #posts-list .post-card > div {
                padding: 1rem;
            }

            .freecat-all-page #posts-list .post-card.has-no-cover > div {
                min-height: 18.5rem;
            }

            .freecat-all-page #posts-list .post-card h3 {
                font-size: 1.125rem !important;
                min-height: 2.8rem;
            }

            .freecat-all-page #posts-list .post-card.has-no-cover p {
                -webkit-line-clamp: 9 !important;
                min-height: 12.995rem;
            }

            .freecat-all-page #posts-list .post-card .mt-8.h-\[180px\] {
                height: 9rem !important;
            }

            .freecat-all-page [data-all-toolbar] {
                align-items: flex-start;
                flex-direction: column;
                gap: 0.875rem;
            }

            .freecat-all-page [data-all-sort-controls] {
                flex-wrap: wrap;
                gap: 0.625rem;
            }
        }
    </style>
</head>

<body
    class="freecat-all-page bg-background-light dark:bg-background-dark font-display text-[#1e293b] dark:text-slate-200 transition-colors duration-200">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">

        <!-- INCLUDE:header -->

        <!-- 主内容区
             用 CSS 变量 --freecat-page-top-offset（= header 高度 + 安全间距，
             定义在 assets/transitions.css 中）作为 margin-top，
             保证首屏渲染就避开固定顶栏；JS 仍会按真实 header 尺寸做实时同步。 -->
        <div data-floating-nav-container
            class="layout-container page-blur-target mt-[var(--freecat-page-top-offset)] flex h-full grow flex-col px-10 sm:px-12 md:px-20 lg:px-12 pt-3 pb-2 md:pt-4">
            <div class="layout-content-container relative flex flex-col max-w-[1200px] flex-1 mx-auto w-full">
                <h1 class="sr-only">All Articles</h1>

                <div data-all-toolbar
                    class="flex items-center justify-start gap-4 pb-6 pt-6 border-b border-gray-300 dark:border-gray-800 mb-12">
                    <a href="/"
                        onclick="if(document.referrer.includes(window.location.host)){history.back();return false;}"
                        class="group inline-flex items-center gap-2 h-10 text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300 transition-colors duration-150">
                        <svg class="text-xl t-btn-arrow-prev"
                            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="1em"
                            height="1em">
                            <path
                                d="M10.8284 12.0007L15.7782 16.9504L14.364 18.3646L8 12.0007L14.364 5.63672L15.7782 7.05093L10.8284 12.0007Z">
                            </path>
                        </svg>
                        <span class="text-sm font-bold">Go Back</span>
                    </a>
                    <div data-all-sort-controls class="flex items-center gap-2">
                        <button type="button" class="freecat-all-sort" data-sort-mode="date" aria-pressed="true">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C17.5228 2 22 6.47715 22 12C22 17.5228 17.5228 22 12 22C6.47715 22 2 17.5228 2 12H4C4 16.4183 7.58172 20 12 20C16.4183 20 20 16.4183 20 12C20 7.58172 16.4183 4 12 4C9.25022 4 6.82447 5.38734 5.38451 7.50024L8 7.5V9.5H2V3.5H4L3.99989 5.99918C5.82434 3.57075 8.72873 2 12 2ZM13 7L12.9998 11.585L16.2426 14.8284L14.8284 16.2426L10.9998 12.413L11 7H13Z"></path></svg>
                            <span>按时间排序</span>
                        </button>
                        <button type="button" class="freecat-all-sort" data-sort-mode="modified" aria-pressed="false">
                            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"><path d="M6 4H4V2H20V4H18V6C18 7.61543 17.1838 8.91468 16.1561 9.97667C15.4532 10.703 14.598 11.372 13.7309 12C14.598 12.628 15.4532 13.297 16.1561 14.0233C17.1838 15.0853 18 16.3846 18 18V20H20V22H4V20H6V18C6 16.3846 6.81616 15.0853 7.8439 14.0233C8.54682 13.297 9.40202 12.628 10.2691 12C9.40202 11.372 8.54682 10.703 7.8439 9.97667C6.81616 8.91468 6 7.61543 6 6V4ZM8 4V6C8 6.88457 8.43384 7.71032 9.2811 8.58583C10.008 9.33699 10.9548 10.0398 12 10.7781C13.0452 10.0398 13.992 9.33699 14.7189 8.58583C15.5662 7.71032 16 6.88457 16 6V4H8ZM12 13.2219C10.9548 13.9602 10.008 14.663 9.2811 15.4142C8.43384 16.2897 8 17.1154 8 18V20H16V18C16 17.1154 15.5662 16.2897 14.7189 15.4142C13.992 14.663 13.0452 13.9602 12 13.2219Z"></path></svg>
                            <span>按更新排序</span>
                        </button>
                    </div>
                </div>

                <!-- === 动态文章注入区（显示所有文章，无分页） === -->
                <div id="posts-list">
                    <!-- ALL_POSTS_LIST_PLACEHOLDER -->
                </div>
                <!-- ===================== -->

            </div>
        </div>

        <div class="freecat-all-floating-nav fixed top-32 h-[calc(100vh-300px)] flex-col items-center">
            <div class="flex flex-1 flex-col justify-center gap-4">
                <button id="back-to-top" aria-label="Back to Top"
                    class="t-btn-icon t-floating-nav is-hidden group relative flex items-center justify-center rounded-full size-12 bg-[#fcfcfd] dark:bg-card-dark text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300">
                    <span class="text-2xl t-btn-arrow-up">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="1em" height="1em">
                            <path d="M11.9999 10.8284L7.0502 15.7782L5.63599 14.364L11.9999 8L18.3639 14.364L16.9497 15.7782L11.9999 10.8284Z"></path>
                        </svg>
                    </span>
                </button>
                <button id="scroll-to-bottom" aria-label="Scroll to Bottom"
                    class="t-btn-icon t-floating-nav is-hidden group relative flex items-center justify-center rounded-full size-12 bg-[#fcfcfd] dark:bg-card-dark text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300">
                    <span class="text-2xl t-btn-arrow-down">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="1em" height="1em">
                            <path d="M11.9999 13.1714L16.9497 8.22168L18.3639 9.63589L11.9999 15.9999L5.63599 9.63589L7.0502 8.22168L11.9999 13.1714Z"></path>
                        </svg>
                    </span>
                </button>
            </div>
            <button id="floating-go-back" aria-label="Go Back"
                class="t-btn-icon t-floating-nav is-hidden group relative flex items-center justify-center rounded-full size-12 bg-[#fcfcfd] dark:bg-card-dark text-slate-400 dark:text-slate-500 hover:text-slate-600 dark:hover:text-slate-300">
                <span class="text-2xl t-btn-arrow-prev">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="1em" height="1em">
                        <path d="M10.8284 12.0007L15.7782 16.9504L14.364 18.3646L8 12.0007L14.364 5.63672L15.7782 7.05093L10.8284 12.0007Z"></path>
                    </svg>
                </span>
            </button>
        </div>

        <!-- INCLUDE:footer -->
    </div>

    <!-- INCLUDE:scripts-end -->
    <script>
        (function () {
            const list = document.getElementById('posts-list');
            const buttons = Array.from(document.querySelectorAll('[data-sort-mode]'));
            if (!list || buttons.length === 0) return;

            const cards = Array.from(list.querySelectorAll('.post-card')).map((card, index) => ({ card, index }));
            const prefersReducedMotion = () => window.matchMedia('(prefers-reduced-motion: reduce)').matches;
            const applyCurrentOrderAnimations = () => {
                if (prefersReducedMotion()) return;
                Array.from(list.querySelectorAll('.post-card')).forEach((card, index) => {
                    card.classList.remove('animate-fade-in-up');
                    card.style.animationDelay = `${index * 90}ms`;
                    void card.offsetWidth;
                    card.classList.add('animate-fade-in-up');
                });
            };

            const sortCards = (mode) => {
                cards
                    .sort((a, b) => {
                        const pinnedDelta = mode === 'date'
                            ? Number(b.card.dataset.sortPinned || 0) - Number(a.card.dataset.sortPinned || 0)
                            : 0;
                        const field = mode === 'modified' ? 'sortModified' : 'sortDate';
                        const delta = pinnedDelta || Number(b.card.dataset[field] || 0) - Number(a.card.dataset[field] || 0);
                        return delta || a.index - b.index;
                    })
                    .forEach(({ card }) => list.appendChild(card));

                buttons.forEach((button) => {
                    button.setAttribute('aria-pressed', String(button.dataset.sortMode === mode));
                });

                requestAnimationFrame(applyCurrentOrderAnimations);
            };

            buttons.forEach((button) => {
                button.addEventListener('click', () => sortCards(button.dataset.sortMode));
            });
        }());
    </script>
</body>

</html>
