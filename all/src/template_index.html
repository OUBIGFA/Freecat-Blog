<!DOCTYPE html>
<html lang="<!-- SITE_LANGUAGE -->">

<head>
    <!-- INCLUDE:head-base -->
    <title><!-- SITE_TITLE --></title>
    <!-- HOME_SEO_HEAD -->
    <!-- HOME_JSONLD -->

    <style>
        /* 首页专用：Hero 区入场动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate3d(0, 20px, 0);
            }

            to {
                opacity: 1;
                transform: translate3d(0, 0, 0);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 1.0s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
        }

        .delay-150 {
            animation-delay: 150ms;
        }

        .delay-300 {
            animation-delay: 300ms;
        }

        :root {
            /* 注：--freecat-header-height / --freecat-header-safe-gap / --freecat-page-top-offset
               已在 assets/transitions.css 中作为全站默认值定义，这里只补充首页专属变量。 */
            --freecat-hero-content-fallback-height: 420px;
            --freecat-hero-bottom-safe-gap: clamp(44px, 8svh, 88px);
            --freecat-hero-slot-height: 0px;
            --freecat-hero-avatar-size: 20rem;
            --freecat-hero-title-size: clamp(2.5rem, 3.2vw, 3rem);
            --freecat-hero-height: max(
                var(--freecat-hero-slot-height),
                var(--freecat-hero-measured-height, calc(var(--freecat-hero-content-fallback-height) + var(--freecat-hero-bottom-safe-gap)))
            );
            --freecat-posts-edge-gap: clamp(6px, 1.2vw, 14px);
            --freecat-posts-gap: clamp(18px, 3vw, 36px);
            --freecat-canvas: #f6f6f8;
            --freecat-hero-canvas: #fafbfc;
            --freecat-line: #d7dde5;
            --freecat-posts-plane-border: #f0f2f4;
        }

        .dark {
            --freecat-canvas: #101622;
            --freecat-hero-canvas: #151d2a;
            --freecat-line: #233044;
            --freecat-posts-plane-border: #1f2937;
        }

        .freecat-home-stage {
            background: var(--freecat-canvas);
            isolation: isolate;
        }

        .freecat-hero-bg {
            position: fixed;
            inset: 0 0 auto 0;
            z-index: 0;
            height: calc(var(--freecat-page-top-offset) + var(--freecat-hero-height));
            overflow: hidden;
            background: var(--freecat-hero-canvas);
            padding-top: var(--freecat-page-top-offset);
        }

        .freecat-hero-spacer {
            height: calc(var(--freecat-page-top-offset) + var(--freecat-hero-height));
            flex: 0 0 auto;
        }

        .freecat-hero-avatar {
            background-color: color-mix(in srgb, white 82%, var(--freecat-hero-canvas));
            aspect-ratio: 1 / 1;
            border-radius: 50% !important;
            box-shadow:
                0 38px 80px rgba(17, 19, 24, 0.12),
                inset 0 1px 0 rgba(255, 255, 255, 0.86);
        }

        .freecat-posts-plane {
            position: relative;
            z-index: 10;
            min-height: 100vh;
            padding-top: var(--freecat-posts-edge-gap);
            background: var(--freecat-canvas);
            border-top: 1px solid var(--freecat-posts-plane-border);
        }

        .freecat-hero-layout {
            min-height: var(--freecat-hero-slot-height);
        }

        @media (min-width: 641px) and (max-width: 1183px) {
            :root {
                --freecat-hero-content-fallback-height: 638px;
                --freecat-hero-bottom-safe-gap: clamp(28px, 4svh, 52px);
            }
        }

        @media (min-width: 1184px) {
            :root {
                --freecat-hero-slot-height: clamp(460px, 58svh, 540px);
                --freecat-hero-content-fallback-height: 360px;
                --freecat-hero-bottom-safe-gap: clamp(14px, 2.4svh, 24px);
            }
        }

        @media (max-width: 640px) {
            :root {
                --freecat-hero-content-fallback-height: 300px;
                --freecat-hero-bottom-safe-gap: clamp(10px, 1.6svh, 14px);
                --freecat-hero-avatar-size: clamp(96px, 22vw, 128px);
                --freecat-hero-title-size: clamp(1.75rem, 6.6vw, 2.25rem);
                --freecat-posts-edge-gap: 24px;
                --freecat-posts-gap: 0px;
            }

            .freecat-hero-layout {
                align-items: center;
            }

            .freecat-hero-copy {
                align-items: center;
                text-align: center;
            }

            .freecat-hero-copy > div,
            .freecat-hero-copy h1,
            .freecat-hero-copy h2 {
                text-align: center;
            }

            .freecat-hero-copy h2 {
                margin-inline: auto;
            }
        }

        /* 首页第一屏不展示分页头时，移除其占位空白 */
        #view-all-header:empty {
            display: none;
            margin: 0;
            padding: 0;
            border: 0;
        }

        #posts-list {
            padding-top: var(--freecat-posts-gap);
        }

        #view-all-header:not(:empty) + #posts-list {
            padding-top: 0;
        }

        .freecat-home-recent-sidebar {
            width: 16rem;
        }

        .freecat-home-recent-shell {
            display: none;
        }

        .freecat-home-recent-sidebar.is-fixed {
            position: fixed;
            top: calc(var(--freecat-header-height, 72px) + 56px);
            z-index: 20;
        }

        @media (min-width: 1880px) {
            .freecat-home-recent-shell {
                display: block;
            }
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-[#1e293b] dark:text-slate-200 transition-colors duration-200">
    <div class="freecat-home-stage relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">

        <!-- INCLUDE:header -->

        <!-- 主内容区 -->
        <div class="layout-container page-blur-target flex h-full grow flex-col">
            <div id="avatar-trigger-area" class="freecat-hero-bg w-full">
                <div class="px-8 md:px-20 lg:px-40">
                    <div class="layout-content-container flex flex-col max-w-[1200px] flex-1 mx-auto w-full">

                        <!-- Hero Section (只在第一页显示，或者保留不动)
                             注意 DOM 顺序：avatar 在前、文字在后。
                             - 窄屏 (<864px) 用 flex-col，items 自上而下排列：
                               avatar 顶部、文字底部；若内容超过 hero 高度，溢出会向"下"
                               （被 hero-bg overflow:hidden 与上层 posts-plane 遮住），
                               不会再向"上"侵入固定顶栏。
                             - 宽屏用 flex-row-reverse，DOM 顺序保持
                               avatar 在前、文字在后，但视觉仍是文字左、avatar 右。 -->
                        <div id="hero-section" class="@container">
                            <div
                                class="freecat-hero-layout flex flex-col justify-center gap-4 pt-4 pb-[var(--freecat-hero-bottom-safe-gap)] @[480px]:gap-8 @[480px]:pt-10 @[1184px]:flex-row-reverse @[1184px]:items-center @[1184px]:pt-[var(--freecat-hero-bottom-safe-gap)] @[1184px]:gap-12">
                                <div class="w-full @[1184px]:w-1/2 flex justify-center @[1184px]:justify-end">
                                    <div id="hero-avatar"
                                        class="freecat-hero-avatar animate-fade-in-up delay-300 w-[var(--freecat-hero-avatar-size)] bg-center bg-no-repeat bg-cover rounded-full"
                                        style='background-image: url("<!-- HERO_AVATAR -->");'></div>
                                </div>
                                <div class="freecat-hero-copy flex flex-col gap-4 @[480px]:min-w-[400px] @[480px]:gap-8 flex-1">
                                    <div class="flex flex-col gap-3 @[480px]:gap-4 text-left">
                                        <h1
                                            class="animate-fade-in-up text-[#1e293b] dark:text-slate-200 text-[length:var(--freecat-hero-title-size)] font-black leading-[1.08] tracking-[-0.033em] @[1184px]:leading-tight">
                                            <!-- HERO_TITLE -->
                                        </h1>
                                        <h2
                                            class="animate-fade-in-up delay-150 text-[#616f89] dark:text-gray-400 text-xs @[480px]:text-sm font-normal leading-relaxed max-w-xl">
                                            <!-- HERO_SUBTITLE -->
                                        </h2>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <!-- 文章列表标题 -->
                    </div>
                </div>
            </div>

            <div class="freecat-hero-spacer" aria-hidden="true"></div>

            <section class="freecat-posts-plane w-full">
                <div class="w-full px-10 sm:px-12 md:px-20 lg:px-12">
                    <div class="layout-content-container flex flex-col max-w-[1200px] flex-1 mx-auto w-full">
                    <div id="view-all-header"
                        class="flex items-baseline justify-start pb-2 pt-0 mb-5">
                        <!-- PAGINATION_PLACEHOLDER -->
                    </div>
                    <div class="freecat-home-posts-column w-full min-w-0">
                        <!-- === 动态文章注入区 === -->
                        <div id="posts-list">
                            <!-- POSTS_LIST_PLACEHOLDER -->
                        </div>
                        <!-- ===================== -->

                        <!-- 底部主要分页器 -->
                        <div id="pagination-buttons" class="flex justify-center">
                            <!-- PAGINATION_BUTTONS_PLACEHOLDER -->
                        </div>
                    </div>
                    <!-- RECENT_POSTS_SIDEBAR_PLACEHOLDER -->
                    </div>
                </div>
            </section>
        </div>

        <!-- INCLUDE:footer -->
    </div>

    <!-- INCLUDE:scripts-end -->
    <script>
        (() => {
            const sidebar = document.getElementById('home-recent-posts-sidebar');
            const shell = document.getElementById('home-recent-posts-shell');
            const positioningRoot = document.querySelector('.freecat-posts-plane')
                || shell.closest('.layout-content-container')
                || document.body;
            if (!sidebar || !shell || !positioningRoot) return;

            let sidebarLeft = 0;

            const getFixedTop = () => {
                const header = document.querySelector('header');
                return (header ? header.getBoundingClientRect().height : 72) + 56;
            };

            const alignShellToFirstCard = () => {
                const firstCard = document.querySelector('#posts-list .post-card > div')
                    || document.querySelector('#posts-list .post-card');
                if (!firstCard) return;

                const top = firstCard.getBoundingClientRect().top
                    - positioningRoot.getBoundingClientRect().top;
                shell.style.marginTop = '0';
                shell.style.top = `${Math.max(0, Math.round(top))}px`;
            };

            const captureSidebarLeft = () => {
                alignShellToFirstCard();
                sidebar.classList.remove('is-fixed');
                sidebar.style.left = '';
                sidebar.style.top = '';
                sidebarLeft = sidebar.getBoundingClientRect().left;
            };

            const updateSidebarPosition = () => {
                const fixedTop = getFixedTop();
                const naturalTop = shell.getBoundingClientRect().top;
                const shouldFix = naturalTop <= fixedTop;
                if (!shouldFix) {
                    sidebar.classList.remove('is-fixed');
                    sidebar.style.left = '';
                    sidebar.style.top = '';
                    return;
                }

                if (!sidebar.classList.contains('is-fixed')) {
                    captureSidebarLeft();
                }
                sidebar.classList.add('is-fixed');
                sidebar.style.left = `${sidebarLeft}px`;
                sidebar.style.top = `${fixedTop}px`;
            };

            captureSidebarLeft();
            updateSidebarPosition();
            window.addEventListener('scroll', updateSidebarPosition, { passive: true });
            window.addEventListener('resize', () => {
                captureSidebarLeft();
                updateSidebarPosition();
            }, { passive: true });
        })();
    </script>
</body>

</html>
