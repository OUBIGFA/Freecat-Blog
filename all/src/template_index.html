<!DOCTYPE html>
<html lang="<!-- SITE_LANGUAGE -->">

<head>
    <!-- INCLUDE:head-base -->
    <title><!-- SITE_TITLE --></title>
    <!-- HOME_SEO_HEAD -->
    <!-- HOME_JSONLD -->

    <style>
        /* 首页专用：Hero 区入场动画 */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translate3d(0, 20px, 0);
            }

            to {
                opacity: 1;
                transform: translate3d(0, 0, 0);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 1.0s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            opacity: 0;
        }

        .delay-150 {
            animation-delay: 150ms;
        }

        .delay-300 {
            animation-delay: 300ms;
        }

        :root {
            /* 注：--freecat-header-height / --freecat-header-safe-gap / --freecat-page-top-offset
               已在 assets/transitions.css 中作为全站默认值定义，这里只补充首页专属变量。 */
            --freecat-canvas: #f6f6f8;
            --freecat-hero-canvas: #fafbfc;
            /* sidebar 自身宽度独立，与 inner 居中无关 */
            --freecat-home-sidebar-width: clamp(420px, 24vw, 500px);
            /* sidebar 内的内容尺寸独立，与 sidebar 宽度无关（只要 sidebar 装得下即可） */
            --freecat-hero-avatar-size: clamp(180px, 14vw, 260px);
            --freecat-hero-title-size: clamp(1.625rem, 2vw, 2rem);
            --freecat-hero-text-max: 420px;
            /* 文章 inner 的目标最大宽度；实际宽度还受"不被 sidebar 遮挡"约束。 */
            --freecat-home-content-max: 1100px;
        }

        .dark {
            --freecat-canvas: #101622;
            --freecat-hero-canvas: #151d2a;
        }

        .freecat-home-stage {
            background: var(--freecat-canvas);
            isolation: isolate;
            overflow-x: clip;
        }

        .freecat-home-layout {
            display: flex;
            flex-direction: column;
            width: 100%;
        }

        .freecat-home-sidebar {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.75rem;
            min-width: 0;
            background: var(--freecat-hero-canvas);
        }

        .freecat-home-sidebar-top {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.75rem;
            width: 100%;
            min-width: 0;
        }

        .freecat-home-sidebar-bottom {
            width: 100%;
            min-width: 0;
        }

        .freecat-home-sidebar-hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.75rem;
            width: 100%;
        }

            .freecat-home-sidebar-hero-text {
            width: 100%;
            text-align: left;
        }

        .freecat-home-sidebar-hero-text h1,
        .freecat-home-sidebar-hero-text h2 {
            text-align: left;
        }

            .freecat-home-sidebar-recent {
            width: 100%;
        }

        .freecat-home-posts {
            min-width: 0;
            width: 100%;
            background: var(--freecat-canvas);
        }

        .freecat-hero-avatar {
            background-color: color-mix(in srgb, white 82%, var(--freecat-hero-canvas));
            aspect-ratio: 1 / 1;
            border-radius: 50% !important;
        }

        /* 桌面端：sidebar 用 position: fixed 钉在视口左侧，整列从顶到底铺满；
           不随页面滚动，footer 滚入时由更高的 z-index 自然覆盖在它之上。
           最近更新跟随介绍靠上排列。 */
        @media (min-width: 1024px) {
            .freecat-home-layout {
                position: relative;
                min-height: calc(100vh - var(--freecat-header-height, 80px));
            }

            .freecat-home-sidebar {
                position: fixed;
                top: 0;
                left: 0;
                bottom: 0;
                width: var(--freecat-home-sidebar-width);
                background: var(--freecat-hero-canvas);
                display: flex;
                flex-direction: column;
                gap: 0;
                padding: calc(var(--freecat-page-top-offset, 112px) + 40px) clamp(44px, 3.2vw, 64px) 1.5rem;
                z-index: 1;
                overflow: hidden;
            }

            .freecat-home-sidebar-top {
                padding-bottom: 0;
                flex: 0 0 auto;
            }

            /* sidebar-bottom 占用剩余高度并允许收缩；溢出时底部用渐变遮罩做"省略号"效果 */
            .freecat-home-sidebar-bottom {
                margin-top: clamp(2rem, 5vh, 4rem);
                padding-bottom: 0;
                flex: 1 1 auto;
                min-height: 0;
                overflow: hidden;
                -webkit-mask-image: linear-gradient(to bottom, #000 0, #000 calc(100% - 32px), transparent 100%);
                mask-image: linear-gradient(to bottom, #000 0, #000 calc(100% - 32px), transparent 100%);
            }

            .freecat-home-sidebar-recent {
                margin-top: 0;
                padding-top: 0;
                max-width: var(--freecat-hero-text-max);
            }

            .freecat-home-sidebar-hero-text {
                max-width: var(--freecat-hero-text-max);
            }

            .freecat-home-posts {
                /* 跨整个视口；left padding 把 inner 推到 sidebar 右侧，
                   宽屏时则把 inner 居中于整个视口（sidebar 自然被覆盖在下层）。 */
                width: 100%;
                padding:
                    calc(var(--freecat-page-top-offset, 112px) + 40px)
                    0
                    56px
                    max(
                        var(--freecat-home-sidebar-width),
                        calc((100vw - var(--freecat-home-content-max)) / 2)
                    );
            }

            /* 自适应规则：先保宽度，再让位，最后等比缩小（保持卡片内部比例）；
               - 视口够宽（≥ inner_max + 2*sidebar）时，inner 居中于整个视口；
               - 视口收窄时，inner 保持原尺寸不压缩，整体向右"贴"sidebar 右侧；
               - 直到 inner 右边触到视口右缘后（视口 < inner_max + sidebar），
                 用 zoom 等比缩小，卡片图片/文字/留白同比例缩，绝不单向压宽。 */
            .freecat-home-posts-inner {
                width: var(--freecat-home-content-max);
                max-width: var(--freecat-home-content-max);
                padding: 0 clamp(16px, 1.6vw, 28px);
                zoom: min(
                    1,
                    calc(
                        (100vw - var(--freecat-home-sidebar-width))
                        / var(--freecat-home-content-max)
                    )
                );
            }

            /* 底部分页器：跨整个视口居中（与 footer 视觉一致），
               用 negative margin-left 抵消 posts 的 padding-left，避免被 sidebar 推偏。 */
            .freecat-home-pagination {
                margin-left: calc(-1 * max(
                    var(--freecat-home-sidebar-width),
                    (100vw - var(--freecat-home-content-max)) / 2
                ));
                width: 100vw;
            }
        }

        /* 移动端 / 平板：单列堆叠；最近更新整段隐藏；sidebar 自己 padding-top 让位顶栏。 */
        @media (max-width: 1023px) {
            :root {
                --freecat-hero-avatar-size: clamp(180px, 36vw, 240px);
                --freecat-hero-title-size: clamp(1.75rem, 6.6vw, 2.25rem);
            }

            .freecat-home-sidebar {
                padding: calc(var(--freecat-page-top-offset, 96px) + 16px) clamp(20px, 5vw, 36px) 36px;
            }

            .freecat-home-posts {
                padding: 28px clamp(20px, 5vw, 40px) 48px;
            }

            .freecat-home-sidebar-recent {
                display: none;
            }
        }

        /* 首页第一屏不展示分页头时，移除其占位空白；
           构建器把占位符替换成空字符串，HTML 缩进会留下文本节点，
           所以用 :not(:has(*)) 才能真正命中"没有元素子节点"的状态。 */
        #view-all-header:empty,
        #view-all-header:not(:has(*)) {
            display: none;
            margin: 0;
            padding: 0;
            border: 0;
        }
    </style>
</head>

<body data-page="home"
    class="bg-background-light dark:bg-background-dark font-display text-[#1e293b] dark:text-slate-200 transition-colors duration-200">
    <div class="freecat-home-stage relative flex h-auto min-h-screen w-full flex-col">

        <!-- INCLUDE:header -->

        <!-- 主内容区：freecat-home-hero 标记让 main.js 跳过 layout-container 的 margin-top，
             左/右两块各自承担让位顶栏的 padding-top。 -->
        <div data-floating-nav-container class="layout-container page-blur-target freecat-home-hero flex h-full grow flex-col">
            <div class="freecat-home-layout w-full">

                <!-- 左侧侧栏：fixed 撑满浏览器视口；
                     最近更新跟随介绍靠上排列，并与侧栏一起固定。
                     保留 avatar-trigger-area / hero-avatar / hero-section 三个 id，
                     以维持 main.js 中头像光影动效与尺寸观察逻辑。 -->
                <aside id="avatar-trigger-area" class="freecat-home-sidebar">
                    <div id="hero-section" class="freecat-home-sidebar-top freecat-home-sidebar-hero @container">
                        <div id="hero-avatar"
                            class="freecat-hero-avatar animate-fade-in-up delay-300 w-[var(--freecat-hero-avatar-size)] bg-center bg-no-repeat bg-cover rounded-full"
                            style='background-image: url("<!-- HERO_AVATAR -->");'></div>
                        <div class="freecat-home-sidebar-hero-text flex flex-col gap-3">
                            <h1
                                class="animate-fade-in-up text-[#1e293b] dark:text-slate-200 text-[length:var(--freecat-hero-title-size)] font-black leading-[1.1] tracking-[-0.02em]">
                                <!-- HERO_TITLE -->
                            </h1>
                            <h2
                                class="animate-fade-in-up delay-150 text-[#616f89] dark:text-gray-400 text-sm lg:text-[15px] font-normal leading-relaxed">
                                <!-- HERO_SUBTITLE -->
                            </h2>
                        </div>
                    </div>
                    <div class="freecat-home-sidebar-bottom">
                        <div class="freecat-home-sidebar-recent">
                            <!-- RECENT_POSTS_SIDEBAR_PLACEHOLDER -->
                        </div>
                    </div>
                </aside>

                <!-- 右侧文章列表区：inner 居中于视口，同时避开左侧 sidebar。 -->
                <section class="freecat-home-posts">
                    <div class="freecat-home-posts-inner w-full">
                        <div id="view-all-header"
                            class="flex items-baseline justify-start pb-2 pt-0 mb-5">
                            <!-- PAGINATION_PLACEHOLDER -->
                        </div>
                        <div class="freecat-home-posts-column w-full min-w-0">
                            <!-- === 动态文章注入区 === -->
                            <div id="posts-list">
                                <!-- POSTS_LIST_PLACEHOLDER -->
                            </div>
                            <!-- ===================== -->
                        </div>
                    </div>

                    <!-- 底部主要分页器：独立于 inner，跨整个视口居中，
                         避免被 sidebar padding-left 推偏，也不受 inner 的 zoom 缩放影响。 -->
                    <div id="pagination-buttons" class="freecat-home-pagination flex justify-center">
                        <!-- PAGINATION_BUTTONS_PLACEHOLDER -->
                    </div>
                </section>

            </div>
        </div>

        <!-- INCLUDE:floating-nav -->

        <!-- INCLUDE:footer -->
    </div>

    <!-- INCLUDE:scripts-end -->
</body>

</html>
