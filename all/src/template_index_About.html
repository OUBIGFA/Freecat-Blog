<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <!-- INCLUDE:head-base -->
    <title>About - <!-- SITE_TITLE --></title>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-[#111318] dark:text-slate-200 transition-colors duration-200">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">

        <!-- INCLUDE:header -->

        <!-- 主内容区
             同 all 模板：用 --freecat-page-top-offset 防止首屏渲染被固定顶栏遮挡。 -->
        <div id="avatar-trigger-area"
            class="layout-container page-blur-target mt-[var(--freecat-page-top-offset)] flex h-full grow flex-col px-8 md:px-20 lg:px-40 pt-3 pb-3 md:pt-4">
            <div class="layout-content-container flex flex-col max-w-[1200px] flex-1 mx-auto w-full">

                <!-- About Hero Section - 居中布局 -->
                <div class="flex flex-col items-center justify-center py-16 md:py-24">
                    <!-- 头像 - 居中且放大 -->
                    <div id="hero-avatar"
                        class="w-40 h-40 md:w-56 md:h-56 bg-center bg-no-repeat bg-cover rounded-full shadow-2xl shadow-gray-700/20 mb-10"
                        style='background-image: url("<!-- ABOUT_HERO_AVATAR -->");'></div>

                    <!-- 标题和副标题 - 居中排版 -->
                    <div class="@container flex flex-col items-center text-center gap-6 w-full">
                        <h1
                            class="text-[#111318] dark:text-slate-200 text-4xl @[480px]:text-5xl font-black leading-tight md:leading-snug tracking-[-0.033em]">
                            <!-- ABOUT_HERO_TITLE -->
                        </h1>
                        <p
                            class="text-[#616f89] dark:text-gray-400 text-lg md:text-xl font-normal leading-relaxed max-w-2xl">
                            <!-- ABOUT_HERO_SUBTITLE -->
                        </p>

                        <!-- 社交媒体链接 - 显著放大并增加间距 (自适应移动端) -->
                        <div
                            class="flex flex-wrap justify-center items-center gap-6 md:gap-10 mt-10 md:mt-14 [&_a]:w-8 sm:[&_a]:w-10 md:[&_a]:w-12 [&_a]:h-8 sm:[&_a]:h-10 md:[&_a]:h-12 [&_svg]:w-full [&_svg]:h-full">
                            <!-- SOCIAL_LINKS -->
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <!-- INCLUDE:footer-no-social -->
    </div>

    <!-- INCLUDE:scripts-end -->
</body>

</html>
