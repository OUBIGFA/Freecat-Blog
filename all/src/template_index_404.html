<!DOCTYPE html>
<html lang="<!-- SITE_LANGUAGE -->">

<head>
    <!-- INCLUDE:head-base -->
    <title>404 - <!-- SITE_TITLE --></title>
    <!-- 404 页强制 noindex,follow：让搜索引擎不索引此页，但允许顺着站内链接继续爬取，
         避免误把 404 抓成 soft 404 污染收录信号。 -->
    <meta name="robots" content="noindex,follow" />
    <meta name="description" content="Page not found — return to homepage." />
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-[#1e293b] dark:text-slate-200 transition-colors duration-200">
    <div class="relative flex h-auto min-h-screen w-full flex-col">

        <!-- INCLUDE:header -->

        <main class="page-blur-target flex-grow mt-[var(--freecat-page-top-offset)] flex items-center justify-center">
            <div class="max-w-[640px] mx-auto px-6 py-24 text-center">
                <p class="text-[120px] md:text-[160px] font-black leading-none tracking-tight text-[#1e293b] dark:text-slate-200">
                    404
                </p>
                <h1 class="mt-6 text-2xl md:text-3xl font-extrabold tracking-tight text-[#1e293b] dark:text-slate-200">
                    页面不见了
                </h1>
                <p class="mt-4 text-base md:text-lg text-slate-500 dark:text-slate-400">
                    你访问的链接可能已被移动或删除。
                </p>
                <div class="mt-10 flex flex-wrap justify-center gap-4">
                    <a href="/"
                        class="t-btn t-btn-outline-subtle inline-flex items-center gap-2 px-5 py-2.5 rounded-full border text-sm font-medium">
                        返回首页
                    </a>
                    <a href="/all"
                        class="t-btn t-btn-outline-subtle inline-flex items-center gap-2 px-5 py-2.5 rounded-full border text-sm font-medium">
                        浏览全部文章
                    </a>
                </div>
            </div>
        </main>

        <!-- INCLUDE:footer -->
    </div>

    <!-- INCLUDE:scripts-end -->
</body>

</html>
