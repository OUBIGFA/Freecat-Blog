<!DOCTYPE html>
<html lang="<!-- SITE_LANGUAGE -->">

<head>
    <!-- INCLUDE:head-base -->
    <title>Search - <!-- SITE_TITLE --></title>
    <!-- SEARCH_SEO_HEAD -->
    <style>
        .freecat-home-recent-sidebar {
            width: 16rem;
        }

        .freecat-home-recent-shell {
            display: none;
        }

        .freecat-home-recent-sidebar.is-fixed {
            position: fixed;
            top: calc(var(--freecat-header-height, 72px) + 56px);
            z-index: 20;
        }

        @media (min-width: 1880px) {
            .freecat-home-recent-shell {
                display: block;
            }
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-[#1e293b] dark:text-slate-200 transition-colors duration-200">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">

        <!-- INCLUDE:header -->

        <!-- 主内容区
             同其它模板：用 --freecat-page-top-offset 防止首屏渲染被固定顶栏遮挡。 -->
        <div
            class="layout-container page-blur-target mt-[var(--freecat-page-top-offset)] flex h-full grow flex-col px-8 md:px-20 lg:px-40 pt-3 pb-3 md:pt-4">
            <div class="layout-content-container relative flex flex-col max-w-[1200px] flex-1 mx-auto w-full">

                <!-- Go Back 按钮 (Moved to Header) -->
                <div
                    class="flex items-center justify-between pb-6 pt-10 border-b border-gray-300 dark:border-gray-800 mb-12">
                    <a href="/"
                        onclick="if(document.referrer.includes(window.location.host)){history.back();return false;}"
                        class="group inline-flex items-center gap-2 h-10 text-slate-500 dark:text-slate-400 hover:text-slate-700 dark:hover:text-slate-300 transition-colors duration-150">
                        <svg class="text-xl t-btn-arrow-prev"
                            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="1em"
                            height="1em">
                            <path
                                d="M10.8284 12.0007L15.7782 16.9504L14.364 18.3646L8 12.0007L14.364 5.63672L15.7782 7.05093L10.8284 12.0007Z">
                            </path>
                        </svg>
                        <span class="text-sm font-bold">Go Back</span>
                    </a>
                </div>

                <!-- 搜索结果标题 (Moved Content) -->
                <div class="flex items-center gap-3 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                        class="w-7 h-7 text-primary">
                        <path
                            d="M18.031 16.6168L22.3137 20.8995L20.8995 22.3137L16.6168 18.031C15.0769 19.263 13.124 20 11 20C6.032 20 2 15.968 2 11C2 6.032 6.032 2 11 2C15.968 2 20 6.032 20 11C20 13.124 19.263 15.0769 18.031 16.6168ZM16.0247 15.8748C17.2475 14.6146 18 12.8956 18 11C18 7.1325 14.8675 4 11 4C7.1325 4 4 7.1325 4 11C4 14.8675 7.1325 18 11 18C12.8956 18 14.6146 17.2475 15.8748 16.0247L16.0247 15.8748Z">
                        </path>
                    </svg>
                    <h1
                        class="text-[#1e293b] dark:text-slate-200 text-[22px] font-bold leading-tight tracking-[-0.015em]">
                        Search Results</h1>
                    <span id="results-count" class="text-sm text-gray-500 dark:text-gray-400"></span>
                </div>

                <!-- 搜索查询显示 -->
                <div id="search-query-display"
                    class="mb-12 p-4 rounded-xl bg-gray-100 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700">
                    <p class="text-sm text-gray-600 dark:text-gray-400">
                        Searching for: <span id="current-query"
                            class="font-semibold text-[#1e293b] dark:text-slate-200"></span>
                    </p>
                </div>

                <!-- === 动态搜索结果注入区 === -->
                <div id="search-results">
                    <!-- SEARCH_RESULTS_PLACEHOLDER -->
                </div>
                <!-- ===================== -->
                <!-- RECENT_POSTS_SIDEBAR_PLACEHOLDER -->

                <!-- 无结果提示 (默认隐藏) -->
                <div id="no-results" class="hidden text-center py-20">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"
                        class="inline-block w-16 h-16 text-gray-300 dark:text-gray-600 mb-4">
                        <path d="M2.39732 1.86908L4.15967 0.107422L23.2796 19.2273L21.5176 20.9897L18.0309 17.5031C16.4909 18.7351 14.5379 19.5 12.4 19.5C7.43168 19.5 3.4 15.4683 3.4 10.5C3.4 8.36211 4.16493 6.40911 5.39686 4.86908L2.39732 1.86908ZM6.81106 6.28332C5.95212 7.4458 5.4 8.91211 5.4 10.5C5.4 14.3675 8.5325 17.5 12.4 17.5C13.9879 17.5 15.4542 16.9479 16.6167 16.0889L6.81106 6.28332ZM12.4 1.5C17.3683 1.5 21.4 5.53168 21.4 10.5C21.4 12.4458 20.7888 14.2542 19.7556 15.7349L18.3115 14.2908C19.0606 13.2168 19.4 11.9035 19.4 10.5C19.4 6.6325 16.2675 3.5 12.4 3.5C10.9965 3.5 9.6832 3.83942 8.6092 4.58849L7.16511 3.14441C8.6458 2.11119 10.4542 1.5 12.4 1.5Z"/>
                    </svg>
                    <h3 class="text-xl font-bold text-gray-500 dark:text-gray-400 mb-2">No results found</h3>
                    <p class="text-gray-400 dark:text-gray-500">Try searching with different keywords</p>
                </div>

            </div>
        </div>

        <!-- INCLUDE:footer -->
    </div>

    <!-- INCLUDE:scripts-end -->
    <script>
        (() => {
            const sidebar = document.getElementById('home-recent-posts-sidebar');
            const shell = document.getElementById('home-recent-posts-shell');
            const positioningRoot = shell?.closest('.layout-content-container') || document.body;
            if (!sidebar || !shell || !positioningRoot) return;

            let sidebarLeft = 0;

            const getFixedTop = () => {
                const header = document.querySelector('header');
                return (header ? header.getBoundingClientRect().height : 72) + 56;
            };

            const alignShellToFirstCard = () => {
                const firstCard = document.querySelector('#search-results .post-card > div')
                    || document.querySelector('#search-results .post-card')
                    || document.getElementById('search-results');
                if (!firstCard) return;

                const top = firstCard.getBoundingClientRect().top
                    - positioningRoot.getBoundingClientRect().top;
                shell.style.marginTop = '0';
                shell.style.top = `${Math.max(0, Math.round(top))}px`;
            };

            const captureSidebarLeft = () => {
                alignShellToFirstCard();
                sidebar.classList.remove('is-fixed');
                sidebar.style.left = '';
                sidebar.style.top = '';
                sidebarLeft = sidebar.getBoundingClientRect().left;
            };

            const updateSidebarPosition = () => {
                const fixedTop = getFixedTop();
                const naturalTop = shell.getBoundingClientRect().top;
                const shouldFix = naturalTop <= fixedTop;
                if (!shouldFix) {
                    sidebar.classList.remove('is-fixed');
                    sidebar.style.left = '';
                    sidebar.style.top = '';
                    return;
                }

                if (!sidebar.classList.contains('is-fixed')) {
                    captureSidebarLeft();
                }
                sidebar.classList.add('is-fixed');
                sidebar.style.left = `${sidebarLeft}px`;
                sidebar.style.top = `${fixedTop}px`;
            };

            const refreshSidebar = () => {
                captureSidebarLeft();
                updateSidebarPosition();
            };

            refreshSidebar();
            window.addEventListener('scroll', updateSidebarPosition, { passive: true });
            window.addEventListener('resize', refreshSidebar, { passive: true });

            const results = document.getElementById('search-results');
            if (results) {
                new MutationObserver(refreshSidebar).observe(results, { childList: true, subtree: true });
            }
        })();
    </script>
</body>

</html>
