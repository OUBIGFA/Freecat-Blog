<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <script><!-- THEME_SCRIPT --></script>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Search - <!-- SITE_TITLE --></title>
    <!-- 网站图标 -->
    <link rel="icon" href="<!-- SITE_FAVICON -->" />

    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" />
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.22/dist/katex.min.css" />

    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

    <script id="tailwind-config">
        /* TAILWIND_CONFIG_PLACEHOLDER */
    </script>
    <style>
        /* Loader from Uiverse.io by Fernando-sv */
        .loader {
            border: 4px solid rgba(0, 0, 0, .1);
            border-left-color: transparent;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            animation: spin89345 1s linear infinite;
        }

        .dark .loader {
            border-color: rgba(255, 255, 255, .1);
            border-left-color: transparent;
        }

        @keyframes spin89345 {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-[#111318] dark:text-slate-200 transition-colors duration-200">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">

        <header
            class="fixed top-0 left-0 w-full z-50 flex items-center justify-between whitespace-nowrap border-b border-solid border-[#f0f2f4] dark:border-gray-800 bg-white/80 dark:bg-background-dark/80 backdrop-blur-md px-4 py-3 md:px-10 md:py-4 lg:px-40">
            <div class="header-blur-target flex w-full items-center justify-between whitespace-nowrap">
                <a href="/" class="flex items-center gap-4 text-[#111318] dark:text-slate-200">
                    <div class="size-6 text-gray-700 dark:text-gray-300">
                        <!-- SITE_LOGO_ICON -->
                    </div>
                    <h2 class="text-base md:text-lg font-bold leading-tight tracking-[-0.015em]"><!-- SITE_NAME --></h2>
                </a>
                <div class="flex flex-1 justify-end gap-2 md:gap-8">
                    <div id="nav-links" class="hidden md:flex items-center gap-6 lg:gap-9">
                        <a class="text-sm font-medium leading-normal text-gray-700 dark:text-gray-300" href="/">Home</a>
                        <a class="text-[#111318] dark:text-gray-300 text-sm font-medium leading-normal hover:text-gray-700 dark:hover:text-gray-400 transition-colors"
                            href="/about.html">About</a>
                    </div>
                    <!-- Search Button -->
                    <button aria-label="Search"
                        class="group relative flex items-center justify-center rounded-full size-9 md:size-10 bg-[#f0f2f4] dark:bg-gray-800 text-[#111318] dark:text-slate-200 hover:text-primary dark:hover:text-primary transition-all duration-300"
                        id="search-toggle">
                        <svg class="icon-breathe text-lg md:text-xl transition-transform duration-300 group-hover:rotate-12 text-gray-700 dark:text-gray-400"
                            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="1em"
                            height="1em">
                            <path
                                d="M18.031 16.6168L22.3137 20.8995L20.8995 22.3137L16.6168 18.031C15.0769 19.263 13.124 20 11 20C6.032 20 2 15.968 2 11C2 6.032 6.032 2 11 2C15.968 2 20 6.032 20 11C20 13.124 19.263 15.0769 18.031 16.6168ZM16.0247 15.8748C17.2475 14.6146 18 12.8956 18 11C18 7.1325 14.8675 4 11 4C7.1325 4 4 7.1325 4 11C4 14.8675 7.1325 18 11 18C12.8956 18 14.6146 17.2475 15.8748 16.0247L16.0247 15.8748Z">
                            </path>
                        </svg>
                    </button>
                    <a href="/about.html" aria-label="About"
                        class="group relative flex md:hidden items-center justify-center rounded-full size-9 bg-[#f0f2f4] dark:bg-gray-800 text-[#111318] dark:text-slate-200 border border-gray-200 dark:border-gray-700 hover:text-primary dark:hover:text-primary transition-all duration-300">
                        <svg class="icon-breathe text-lg transition-transform duration-300 group-hover:rotate-6 text-gray-700 dark:text-gray-400"
                            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="1em"
                            height="1em">
                            <path
                                d="M20 22H18V20C18 18.3431 16.6569 17 15 17H9C7.34315 17 6 18.3431 6 20V22H4V20C4 17.2386 6.23858 15 9 15H15C17.7614 15 20 17.2386 20 20V22ZM12 13C8.68629 13 6 10.3137 6 7C6 3.68629 8.68629 1 12 1C15.3137 1 18 3.68629 18 7C18 10.3137 15.3137 13 12 13ZM12 11C14.2091 11 16 9.20914 16 7C16 4.79086 14.2091 3 12 3C9.79086 3 8 4.79086 8 7C8 9.20914 9.79086 11 12 11Z">
                            </path>
                        </svg>
                    </a>
                    <button aria-label="Toggle theme"
                        class="group relative flex items-center justify-center rounded-full size-9 md:size-10 bg-[#f0f2f4] dark:bg-gray-800 text-[#111318] dark:text-slate-200 border border-gray-200 dark:border-gray-700 hover:text-primary dark:hover:text-primary transition-all duration-300"
                        id="theme-toggle">
                        <svg class="icon-breathe text-lg md:text-xl transition-transform duration-300 group-hover:rotate-12 text-gray-700 dark:text-gray-400"
                            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="1em"
                            height="1em">
                            <path
                                d="M12 18C8.68629 18 6 15.3137 6 12C6 8.68629 8.68629 6 12 6C15.3137 6 18 8.68629 18 12C18 15.3137 15.3137 18 12 18ZM12 16C14.2091 16 16 14.2091 16 12C16 9.79086 14.2091 8 12 8C9.79086 8 8 9.79086 8 12C8 14.2091 9.79086 16 12 16ZM11 1H13V4H11V1ZM11 20H13V23H11V20ZM3.51472 4.92893L4.92893 3.51472L7.05025 5.63604L5.63604 7.05025L3.51472 4.92893ZM16.9497 18.364L18.364 16.9497L20.4853 19.0711L19.0711 20.4853L16.9497 18.364ZM19.0711 3.51472L20.4853 4.92893L18.364 7.05025L16.9497 5.63604L19.0711 3.51472ZM5.63604 16.9497L7.05025 18.364L4.92893 20.4853L3.51472 19.0711L5.63604 16.9497ZM23 11V13H20V11H23ZM4 11V13H1V11H4Z">
                            </path>
                        </svg>
                    </button>
                </div>
            </div>
            <!-- Search Box (hidden by default, slides in from right) -->
            <div id="search-container" data-open="false"
                class="hidden items-center gap-3 absolute left-1/2 top-1/2 z-50 w-[min(680px,calc(100vw-5.5rem))] max-w-[680px] -translate-x-1/2 -translate-y-1/2 rounded-full bg-white/95 p-1 backdrop-blur dark:bg-background-dark/95 md:w-[min(680px,calc(100vw-8rem))]">
                <input type="text" id="search-input" placeholder="Search articles..."
                    class="flex-1 min-w-0 md:w-auto px-4 py-2 rounded-full bg-[#f0f2f4] dark:bg-gray-800 text-base md:text-sm text-[#111318] dark:text-slate-200 placeholder-gray-500 dark:placeholder-gray-400 focus:outline-none focus:ring-0 border-none outline-none focus:border-none ring-0 transition-all" />
                <button id="search-close" aria-label="Close search"
                    class="group relative flex items-center justify-center rounded-full size-9 md:size-10 bg-[#f0f2f4] dark:bg-gray-800 text-[#111318] dark:text-slate-200 hover:opacity-60 transition-opacity duration-300">
                    <svg class="text-lg md:text-xl text-gray-700 dark:text-gray-400" xmlns="http://www.w3.org/2000/svg"
                        viewBox="0 0 24 24" fill="currentColor" width="1em" height="1em">
                        <path
                            d="M11.9997 10.5865L16.9495 5.63672L18.3637 7.05093L13.4139 12.0007L18.3637 16.9504L16.9495 18.3646L11.9997 13.4149L7.04996 18.3646L5.63574 16.9504L10.5855 12.0007L5.63574 7.05093L7.04996 5.63672L11.9997 10.5865Z">
                        </path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- 主内容区 -->
        <div
            class="layout-container page-blur-target mt-[40px] md:mt-[60px] flex h-full grow flex-col px-8 md:px-20 lg:px-40 pt-3 pb-3 md:pt-4">
            <div class="layout-content-container flex flex-col max-w-[1200px] flex-1 mx-auto w-full">

                <!-- Go Back 按钮 (Moved to Header) -->
                <div
                    class="flex items-center justify-between pb-6 pt-10 border-b border-gray-300 dark:border-gray-800 mb-12">
                    <a href="/"
                        onclick="if(document.referrer.includes(window.location.host)){history.back();return false;}"
                        class="group inline-flex items-center gap-2 px-4 h-10 rounded-xl border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-primary hover:text-slate-50 hover:border-primary transition-all duration-300">
                        <svg class="text-xl transition-transform group-hover:-translate-x-0.5 text-slate-400 dark:text-slate-500"
                            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="1em"
                            height="1em">
                            <path
                                d="M10.8284 12.0007L15.7782 16.9504L14.364 18.3646L8 12.0007L14.364 5.63672L15.7782 7.05093L10.8284 12.0007Z">
                            </path>
                        </svg>
                        <span class="text-sm font-bold">Go Back</span>
                    </a>
                </div>

                <!-- 搜索结果标题 (Moved Content) -->
                <div class="flex items-center gap-3 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                        class="w-7 h-7 text-primary">
                        <path
                            d="M18.031 16.6168L22.3137 20.8995L20.8995 22.3137L16.6168 18.031C15.0769 19.263 13.124 20 11 20C6.032 20 2 15.968 2 11C2 6.032 6.032 2 11 2C15.968 2 20 6.032 20 11C20 13.124 19.263 15.0769 18.031 16.6168ZM16.0247 15.8748C17.2475 14.6146 18 12.8956 18 11C18 7.1325 14.8675 4 11 4C7.1325 4 4 7.1325 4 11C4 14.8675 7.1325 18 11 18C12.8956 18 14.6146 17.2475 15.8748 16.0247L16.0247 15.8748Z">
                        </path>
                    </svg>
                    <h2
                        class="text-[#111318] dark:text-slate-200 text-[22px] font-bold leading-tight tracking-[-0.015em]">
                        Search Results</h2>
                    <span id="results-count" class="text-sm text-gray-500 dark:text-gray-400"></span>
                </div>

                <!-- 搜索查询显示 -->
                <div id="search-query-display"
                    class="mb-12 p-4 rounded-xl bg-gray-100 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700">
                    <p class="text-sm text-gray-600 dark:text-gray-400">
                        Searching for: <span id="current-query"
                            class="font-semibold text-[#111318] dark:text-slate-200"></span>
                    </p>
                </div>

                <!-- === 动态搜索结果注入区 === -->
                <div id="search-results">
                    <!-- SEARCH_RESULTS_PLACEHOLDER -->
                </div>
                <!-- ===================== -->

                <!-- 无结果提示 (默认隐藏) -->
                <div id="no-results" class="hidden text-center py-20">
                    <span
                        class="material-symbols-outlined text-6xl text-gray-300 dark:text-gray-600 mb-4">search_off</span>
                    <h3 class="text-xl font-bold text-gray-500 dark:text-gray-400 mb-2">No results found</h3>
                    <p class="text-gray-400 dark:text-gray-500">Try searching with different keywords</p>
                </div>

            </div>
        </div>

        <footer
            class="page-blur-target mt-auto w-full border-t border-[#f0f2f4] dark:border-gray-800 bg-white dark:bg-background-dark py-10 px-8 md:px-20 lg:px-40">
            <div class="max-w-[1200px] mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex flex-col gap-2 text-center md:text-left">
                    <p class="text-[#111318] dark:text-slate-200 font-bold text-lg"><!-- SITE_NAME --></p>
                    <p class="text-[#616f89] dark:text-gray-500 text-sm"><!-- FOOTER_COPYRIGHT --></p>
                </div>
                <div class="flex items-center gap-6">
                    <!-- SOCIAL_LINKS -->
                </div>
            </div>
        </footer>
    </div>


    <script src="./assets/post-card-template.js"></script>
    <script src="./assets/main.js"></script>
</body>

</html>
