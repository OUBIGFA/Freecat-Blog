<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <!-- INCLUDE:head-base -->
    <title>Search - <!-- SITE_TITLE --></title>
</head>

<body
    class="bg-background-light dark:bg-background-dark font-display text-[#111318] dark:text-slate-200 transition-colors duration-200">
    <div class="relative flex h-auto min-h-screen w-full flex-col overflow-x-hidden">

        <!-- INCLUDE:header -->

        <!-- 主内容区
             同其它模板：用 --freecat-page-top-offset 防止首屏渲染被固定顶栏遮挡。 -->
        <div
            class="layout-container page-blur-target mt-[var(--freecat-page-top-offset)] flex h-full grow flex-col px-8 md:px-20 lg:px-40 pt-3 pb-3 md:pt-4">
            <div class="layout-content-container flex flex-col max-w-[1200px] flex-1 mx-auto w-full">

                <!-- Go Back 按钮 (Moved to Header) -->
                <div
                    class="flex items-center justify-between pb-6 pt-10 border-b border-gray-300 dark:border-gray-800 mb-12">
                    <a href="/"
                        onclick="if(document.referrer.includes(window.location.host)){history.back();return false;}"
                        class="t-btn t-btn-primary group inline-flex items-center gap-2 px-4 h-10 rounded-full border border-gray-200 dark:border-gray-700 text-gray-700 dark:text-gray-300 hover:bg-primary hover:text-slate-50 hover:border-primary">
                        <svg class="text-xl text-slate-400 dark:text-slate-500 t-btn-arrow-prev"
                            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="1em"
                            height="1em">
                            <path
                                d="M10.8284 12.0007L15.7782 16.9504L14.364 18.3646L8 12.0007L14.364 5.63672L15.7782 7.05093L10.8284 12.0007Z">
                            </path>
                        </svg>
                        <span class="text-sm font-bold">Go Back</span>
                    </a>
                </div>

                <!-- 搜索结果标题 (Moved Content) -->
                <div class="flex items-center gap-3 mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                        class="w-7 h-7 text-primary">
                        <path
                            d="M18.031 16.6168L22.3137 20.8995L20.8995 22.3137L16.6168 18.031C15.0769 19.263 13.124 20 11 20C6.032 20 2 15.968 2 11C2 6.032 6.032 2 11 2C15.968 2 20 6.032 20 11C20 13.124 19.263 15.0769 18.031 16.6168ZM16.0247 15.8748C17.2475 14.6146 18 12.8956 18 11C18 7.1325 14.8675 4 11 4C7.1325 4 4 7.1325 4 11C4 14.8675 7.1325 18 11 18C12.8956 18 14.6146 17.2475 15.8748 16.0247L16.0247 15.8748Z">
                        </path>
                    </svg>
                    <h2
                        class="text-[#111318] dark:text-slate-200 text-[22px] font-bold leading-tight tracking-[-0.015em]">
                        Search Results</h2>
                    <span id="results-count" class="text-sm text-gray-500 dark:text-gray-400"></span>
                </div>

                <!-- 搜索查询显示 -->
                <div id="search-query-display"
                    class="mb-12 p-4 rounded-xl bg-gray-100 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700">
                    <p class="text-sm text-gray-600 dark:text-gray-400">
                        Searching for: <span id="current-query"
                            class="font-semibold text-[#111318] dark:text-slate-200"></span>
                    </p>
                </div>

                <!-- === 动态搜索结果注入区 === -->
                <div id="search-results">
                    <!-- SEARCH_RESULTS_PLACEHOLDER -->
                </div>
                <!-- ===================== -->

                <!-- 无结果提示 (默认隐藏) -->
                <div id="no-results" class="hidden text-center py-20">
                    <span
                        class="material-symbols-outlined text-6xl text-gray-300 dark:text-gray-600 mb-4">search_off</span>
                    <h3 class="text-xl font-bold text-gray-500 dark:text-gray-400 mb-2">No results found</h3>
                    <p class="text-gray-400 dark:text-gray-500">Try searching with different keywords</p>
                </div>

            </div>
        </div>

        <!-- INCLUDE:footer -->
    </div>

    <!-- INCLUDE:scripts-end -->
</body>

</html>
