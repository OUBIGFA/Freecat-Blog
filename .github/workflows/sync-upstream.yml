name: Sync upstream template files

# 每周二北京时间 02:17 自动从主仓库 OUBIGFA/Freecat-Blog 同步模板文件
# 同步范围:all/ 文件夹 + README.md + README.en.md
# 北京时间(UTC+8) 周二 02:17 = UTC 周一 18:17
# GitHub Actions 的 schedule 触发可能有几分钟到十几分钟的延迟，属于正常现象
on:
  schedule:
    - cron: '17 18 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-upstream-template:
    runs-on: ubuntu-latest

    steps:
      - name: Check out your repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Skip if this IS the upstream repository
        id: guard
        run: |
          if [ "${{ github.repository }}" = "OUBIGFA/Freecat-Blog" ]; then
            echo "Running on the upstream repo itself, skip syncing."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Add upstream remote and fetch
        if: steps.guard.outputs.skip != 'true'
        run: |
          git remote add upstream https://github.com/OUBIGFA/Freecat-Blog.git 2>/dev/null \
            || git remote set-url upstream https://github.com/OUBIGFA/Freecat-Blog.git
          git fetch upstream main

      - name: Replay upstream template history
        if: steps.guard.outputs.skip != 'true'
        run: |
          # 按上游提交逐个同步模板文件, 让下游仓库的文件历史能看到真实来源。
          # 同步范围: all/、README.md、README.en.md
          # 排除文章快照和字体子集, 保留本仓库自己的版本。
          set -eu
          export LC_ALL=C.UTF-8
          export LANG=C.UTF-8

          paths=(all/ README.md README.en.md)
          generated_state_dir=
          generated_state_id=0

          save_local_generated_state() {
            generated_state_id=$((generated_state_id + 1))
            generated_state_dir="${RUNNER_TEMP:-/tmp}/freecat-generated-state-${generated_state_id}"
            mkdir -p "$generated_state_dir"

            if [ -f all/git-dates.json ]; then
              mkdir -p "$generated_state_dir/all"
              cp all/git-dates.json "$generated_state_dir/all/git-dates.json"
            fi

            if [ -f all/build/font-subsets-manifest.json ]; then
              mkdir -p "$generated_state_dir/all/build"
              cp all/build/font-subsets-manifest.json "$generated_state_dir/all/build/font-subsets-manifest.json"
            fi

            if [ -d all/src/assets/fonts ]; then
              mkdir -p "$generated_state_dir/all/src/assets"
              cp -R all/src/assets/fonts "$generated_state_dir/all/src/assets/fonts"
            fi
          }

          restore_local_generated_state() {
            if [ -f "$generated_state_dir/all/git-dates.json" ]; then
              mkdir -p all
              cp "$generated_state_dir/all/git-dates.json" all/git-dates.json
            else
              git rm -f --ignore-unmatch all/git-dates.json
            fi

            if [ -f "$generated_state_dir/all/build/font-subsets-manifest.json" ]; then
              mkdir -p all/build
              cp "$generated_state_dir/all/build/font-subsets-manifest.json" all/build/font-subsets-manifest.json
            else
              git rm -f --ignore-unmatch all/build/font-subsets-manifest.json
            fi

            if [ -d "$generated_state_dir/all/src/assets/fonts" ]; then
              mkdir -p all/src/assets
              mkdir -p all/src/assets/fonts
              cp -R "$generated_state_dir/all/src/assets/fonts/." all/src/assets/fonts/
            else
              git rm -rf --ignore-unmatch all/src/assets/fonts
            fi
          }

          restore_template_paths() {
            local commit="$1"

            git rm -rf --ignore-unmatch all/

            if git ls-tree -r --name-only "$commit" -- all/ | grep -q .; then
              git checkout "$commit" -- all/
            fi

            for path in README.md README.en.md; do
              if git ls-tree -r --name-only "$commit" -- "$path" | grep -q .; then
                git checkout "$commit" -- "$path"
              fi
            done
          }

          last_synced=$(git log --grep='^Upstream-Commit:' --format=%B | sed -n 's/^Upstream-Commit: //p' | head -n 1)
          upstream_head=$(git rev-parse upstream/main)

          if [ -z "$last_synced" ]; then
            echo "No previous upstream marker found. Migrating to upstream sync markers."

            save_local_generated_state
            restore_template_paths "$upstream_head"
            restore_local_generated_state

            git add -A all/ README.md README.en.md
            if git diff --cached --quiet -- all/ README.md README.en.md; then
              git commit --allow-empty \
                -m "chore(template): mark upstream sync baseline" \
                -m "Upstream-Repository: OUBIGFA/Freecat-Blog" \
                -m "Upstream-Commit: $upstream_head"
            else
              git commit \
                -m "chore(template): sync upstream baseline" \
                -m "Upstream-Repository: OUBIGFA/Freecat-Blog" \
                -m "Upstream-Commit: $upstream_head"
            fi

            git push
            exit 0
          fi

          if [ "$last_synced" = "$upstream_head" ]; then
            echo "Template files already match upstream, nothing to commit."
            exit 0
          fi

          commits=$(git rev-list --reverse "$last_synced..upstream/main" -- "${paths[@]}")
          if [ -z "$commits" ]; then
            echo "No upstream template-file commits to replay."
            exit 0
          fi

          last_replayed=

          for commit in $commits; do
            echo "Replaying upstream commit $commit"
            last_replayed=$commit

            save_local_generated_state
            restore_template_paths "$commit"
            restore_local_generated_state

            git add -A all/ README.md README.en.md
            if git diff --cached --quiet -- all/ README.md README.en.md; then
              echo "No local template changes from $commit, skipping."
              continue
            fi

            git show -s --format=%B "$commit" > /tmp/freecat-upstream-message.txt
            {
              echo
              echo "Upstream-Repository: OUBIGFA/Freecat-Blog"
              echo "Upstream-Commit: $commit"
            } >> /tmp/freecat-upstream-message.txt

            author_name=$(git show -s --format=%an "$commit")
            author_email=$(git show -s --format=%ae "$commit")
            author_date=$(git show -s --format=%aI "$commit")
            commit_date=$(git show -s --format=%cI "$commit")

            GIT_AUTHOR_NAME="$author_name" \
              GIT_AUTHOR_EMAIL="$author_email" \
              GIT_AUTHOR_DATE="$author_date" \
              GIT_COMMITTER_DATE="$commit_date" \
              git commit -F /tmp/freecat-upstream-message.txt
          done

          current_marker=$(git log -1 --format=%B | sed -n 's/^Upstream-Commit: //p' | head -n 1)
          if [ "$current_marker" != "$last_replayed" ]; then
            git commit --allow-empty \
              -m "chore(template): mark upstream sync checkpoint" \
              -m "Upstream-Repository: OUBIGFA/Freecat-Blog" \
              -m "Upstream-Commit: $last_replayed"
          fi

          git push
