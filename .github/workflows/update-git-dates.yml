name: Update article snapshots

on:
  push:
    branches:
      - main
    paths:
      - 'writing/**'
      - 'all/extract-git-dates.js'
      - 'all/build/git-dates.js'
      - '.github/workflows/update-git-dates.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: article-snapshots-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-git-dates:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: all/package-lock.json

      - name: Install dependencies
        working-directory: all
        run: npm ci

      - name: Sync latest snapshots
        run: git pull --rebase origin main

      - name: Generate article snapshots
        working-directory: all
        run: npm run extract-dates

      - name: Commit updated snapshots
        run: |
          if git diff --quiet -- all/git-dates.json; then
            echo "Article snapshots are already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add all/git-dates.json
          git commit -m "chore: update article snapshots"
          git pull --rebase origin main
          (cd all && npm run extract-dates)
          if ! git diff --quiet -- all/git-dates.json; then
            git add all/git-dates.json
            git commit --amend --no-edit
          fi
          git push
